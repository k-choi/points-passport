<!doctype html><html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Points Passport — Bucket List Edition</title>
<style>
:root {
  /* Caribbean sky & sea: blue-sky ground, white-cloud surfaces, turquoise brand, sand + sun accents. */
  --sky-0: #bfe6f5;
  --sky-1: #e4f4fb;
  --cloud: #ffffff;
  --cloud-2: #eef7fb;
  --panel: #ffffff;
  --panel-2: #eef7fb;
  --paper: #fbf4e5;
  --paper-2: #f2e8d3;
  --sea: #0fb1c2;
  --sea-deep: #0b7c98;
  --ocean: #0d3b52;
  --sun: #e8a92e;
  --sun-ink: #a6731a;
  --coral: #f2694a;
  --green: #22a06b;
  --blue: #2f8fc0;
  --teal: #17b3ac;
  --purple: #8f6fc4;
  --red: #e0574a;
  --gold: #d99a2b;
  --gold-2: #a6731a;
  --muted: #5c7d8b;
  --text: #1f4a5c;
  --ink: #0d3b52;
  --line: rgba(13, 59, 82, 0.14);
  --line-ink: rgba(13, 59, 82, 0.16);
  --shadow: 0 10px 28px rgba(11, 74, 110, 0.13);
  --radius: 8px;
  --font-body: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", "Cascadia Code", "Roboto Mono", Menlo, Consolas, monospace;
}
* { box-sizing: border-box; }
html, body { margin: 0; min-height: 100%; background: var(--sky-1); background-image: linear-gradient(180deg, var(--sky-0) 0%, var(--sky-1) 32%, #f4fbfe 62%); background-attachment: fixed; color: var(--text); font-family: var(--font-body); }
button, select, input { font: inherit; }
button { cursor: pointer; }
img { max-width: 100%; display: block; }
.app-shell { width: min(1180px, 100%); margin: 0 auto; min-height: 100vh; padding: 22px; }
.topbar { display:flex; align-items:center; justify-content:space-between; gap:18px; margin-bottom:16px; }
.logo-wrap { display:flex; align-items:center; gap:12px; }
.logo-icon { width:54px; height:54px; filter: drop-shadow(0 10px 20px rgba(0,0,0,.25)); }
.logo-title { line-height:.92; letter-spacing:.14em; text-transform:uppercase; font-weight:800; font-size: clamp(24px, 4vw, 42px); }
.logo-title span { color: var(--gold); display:block; }
.top-actions { display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
.pill-button, .primary-button, .secondary-button, .danger-button, .ghost-button { border:1px solid transparent; color:var(--text); border-radius:7px; padding:9px 13px; font-weight:650; letter-spacing:.01em; box-shadow:none; transition:.12s background, .12s border-color, .12s color; }
.pill-button:hover, .primary-button:hover, .secondary-button:hover, .danger-button:hover, .ghost-button:hover { filter:brightness(1.06); }
.pill-button:active, .primary-button:active, .secondary-button:active, .danger-button:active, .ghost-button:active { filter:brightness(.94); }
.primary-button { background:var(--sea); color:#06333d; font-weight:750; }
.secondary-button { background:#1c6d9c; color:#ffffff; }
.danger-button { background:transparent; border-color:rgba(226,87,74,.6); color:#c53d2e; }
.ghost-button { background:var(--cloud); border-color:var(--line); color:var(--ink); }
.pill-button { background:transparent; border-color:rgba(217,154,43,.6); color:var(--sun-ink); }
button:disabled { opacity:.42; cursor:not-allowed; filter:none!important; }
.resource-bar { display:grid; grid-template-columns: repeat(5, 1fr); gap:10px; margin:14px 0 18px; overflow:visible; }
.resource { position:relative; background:var(--cloud); border:1px solid var(--line); border-radius:10px; padding:12px 14px; display:flex; gap:10px; align-items:center; min-height:70px; box-shadow:var(--shadow); }
.resource .emoji { font-size:22px; width:30px; text-align:center; color:var(--sea-deep); }
.resource .label { color:var(--muted); font-size:10.5px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; font-family:var(--font-mono); }
.resource .value { color:var(--ink); font-size:19px; font-weight:700; white-space:nowrap; font-family:var(--font-mono); font-variant-numeric:tabular-nums; letter-spacing:-.01em; }
.has-tooltip { outline:none; }
.has-tooltip::before, .has-tooltip::after { pointer-events:none; opacity:0; transition:opacity .16s ease .55s, transform .16s ease .55s; }
.has-tooltip::before { content:""; position:absolute; z-index:25; left:50%; top:calc(100% + 4px); transform:translate(-50%, -4px); border:7px solid transparent; border-bottom-color:#fff9ed; filter:drop-shadow(0 3px 2px rgba(0,0,0,.18)); }
.has-tooltip::after { content:attr(data-tooltip); position:absolute; z-index:24; left:50%; top:calc(100% + 17px); width:min(260px, 72vw); transform:translate(-50%, -4px); padding:12px 13px; border-radius:8px; background:#fff9ed; color:#24343a; border:1px solid rgba(240,193,95,.72); box-shadow:0 18px 45px rgba(0,0,0,.36); font-size:13px; font-weight:750; line-height:1.38; text-align:left; }
.has-tooltip:hover::before, .has-tooltip:hover::after, .has-tooltip:focus-visible::before, .has-tooltip:focus-visible::after { opacity:1; transform:translate(-50%, 0); }
.has-tooltip:focus-visible { box-shadow:0 0 0 3px rgba(49,184,239,.38), 0 12px 25px rgba(0,0,0,.2); }
.board-resource-bar .resource:nth-last-child(-n+2)::after { left:auto; right:0; transform:translateY(-4px); }
.board-resource-bar .resource:nth-last-child(-n+2)::before { left:auto; right:22px; transform:translateY(-4px); }
.board-resource-bar .resource:nth-last-child(-n+2):hover::after, .board-resource-bar .resource:nth-last-child(-n+2):focus-visible::after, .board-resource-bar .resource:nth-last-child(-n+2):hover::before, .board-resource-bar .resource:nth-last-child(-n+2):focus-visible::before { transform:translateY(0); }
.layout { display:grid; grid-template-columns: 250px 1fr; gap:18px; align-items:start; }
.nav { position:sticky; top:18px; background:rgba(13,59,82,.8); border:1px solid rgba(13,59,82,.12); border-radius:var(--radius); padding:12px; box-shadow:var(--shadow); }
.nav-button { width:100%; background:transparent; border:0; color:var(--muted); border-radius:16px; padding:13px 12px; margin:3px 0; display:flex; align-items:center; gap:12px; text-align:left; font-weight:850; }
.nav-button:hover { background:rgba(13,59,82,.08); }
.nav-button.active { background:linear-gradient(135deg, rgba(243,199,92,.22), rgba(53,168,255,.18)); color:var(--ink); border:1px solid rgba(243,199,92,.35); }
.nav-button .nav-emoji { font-size:23px; width:30px; }
.side-card { margin-top:12px; padding:15px; border-radius:var(--radius); background:rgba(13,59,82,.05); border:1px solid var(--line); }
.side-card h4 { margin:0 0 8px; }
.side-card p, .side-card li { color:var(--muted); font-size:13px; line-height:1.4; }
.content { min-width:0; }
.card-panel { background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:20px; box-shadow:none; margin-bottom:18px; overflow:hidden; position:relative; }
.card-panel.paper { color:var(--ink); background:var(--paper); border-color:var(--line-ink); }
.card-panel h1, .card-panel h2, .card-panel h3 { margin:0 0 12px; letter-spacing:-.01em; }
.eyebrow { color:var(--sea-deep); text-transform:uppercase; font-size:11px; font-weight:600; letter-spacing:.18em; font-family:var(--font-mono); }
.screen-title { display:flex; align-items:flex-start; justify-content:space-between; gap:14px; margin-bottom:14px; }
.screen-title h1 { font-size: clamp(28px, 4vw, 48px); line-height:1.03; }
.screen-title p { color:var(--muted); margin:6px 0 0; }
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
.grid-3 { display:grid; grid-template-columns:repeat(3, 1fr); gap:14px; }
.grid-4 { display:grid; grid-template-columns:repeat(4, 1fr); gap:14px; }
.objective { display:grid; grid-template-columns: 220px 1fr; gap:18px; align-items:center; }
.destination-art { border-radius:20px; background:#0a2342; min-height:150px; border:1px solid rgba(0,0,0,.12); overflow:hidden; }
.progress-row { margin:12px 0; }
.progress-label { display:flex; justify-content:space-between; font-weight:850; margin-bottom:8px; }
.progress-track { height:15px; background:rgba(13,59,82,.14); border-radius:99px; overflow:hidden; box-shadow: inset 0 2px 4px rgba(0,0,0,.2); }
.progress-fill { height:100%; width:0%; background:linear-gradient(90deg, var(--blue), var(--teal)); border-radius:inherit; transition:width .5s ease; }
.progress-fill.purple { background:linear-gradient(90deg, var(--purple), #d6a3ff); }
.progress-fill.green { background:linear-gradient(90deg, #36c06a, #adf4bc); }
.wallet-row { display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap:14px; }
.credit-card { position:relative; min-height:172px; border-radius:20px; padding:16px; overflow:hidden; border:1px solid rgba(13,59,82,.18); box-shadow: 0 14px 25px rgba(0,0,0,.22); display:flex; flex-direction:column; justify-content:space-between; isolation:isolate; }
.credit-card:before { content:""; position:absolute; inset:-25% -35%; background:radial-gradient(circle at 20% 20%, rgba(13,59,82,.25), transparent 28%), linear-gradient(120deg, rgba(13,59,82,.24), transparent 45%); z-index:-1; transform:rotate(-9deg); }
.credit-card .card-name { font-weight:950; font-size:20px; letter-spacing:.05em; text-transform:uppercase; line-height:1.05; }
.credit-card .chip { width:34px; height:25px; border-radius:6px; background:linear-gradient(135deg, #ffe6a5, #b77d21); border:1px solid rgba(0,0,0,.25); }
.credit-card .tiny { font-size:12px; color:var(--muted); opacity:.92; }
.credit-card.locked { background:rgba(13,59,82,.08)!important; border-style:dashed; justify-content:center; text-align:center; color:var(--muted); }
.asset-card { display:flex; flex-direction:column; gap:10px; background:rgba(13,59,82,.08); border:1px solid rgba(13,59,82,.12); border-radius:18px; padding:14px; }
.asset-card h3 { margin:0; }
.card-art { background:#061a36; border-radius:15px; overflow:hidden; border:1px solid rgba(13,59,82,.12); min-height:120px; display:flex; align-items:center; justify-content:center; }
.card-art img { width:100%; height:100%; object-fit:cover; }
.stats-list { display:grid; gap:8px; }
.stat-line { display:flex; justify-content:space-between; gap:10px; align-items:center; color:var(--muted); border-bottom:1px solid rgba(13,59,82,.09); padding-bottom:7px; }
.stat-line strong { color:var(--ink); }
.shop-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap:14px; }
.shop-card { background:linear-gradient(180deg, rgba(13,59,82,.11), rgba(13,59,82,.05)); border:1px solid rgba(13,59,82,.14); border-radius:20px; padding:14px; display:flex; flex-direction:column; gap:12px; position:relative; overflow:hidden; }
.shop-card.recommended { border-color:rgba(243,199,92,.78); box-shadow: 0 0 0 2px rgba(243,199,92,.12), var(--shadow); }
.ribbon { position:absolute; top:12px; right:-34px; transform:rotate(35deg); background:var(--gold); color:#1d1203; padding:5px 38px; font-size:11px; font-weight:950; }
.badge { display:inline-flex; align-items:center; gap:6px; border-radius:999px; padding:5px 10px; background:rgba(13,59,82,.1); color:var(--muted); border:1px solid rgba(13,59,82,.14); font-size:12px; font-weight:850; }
.badge.good { background:rgba(89,211,125,.15); color:#1a7d4f; border-color:rgba(89,211,125,.25); }
.badge.warn { background:rgba(243,199,92,.15); color:var(--sun-ink); border-color:rgba(243,199,92,.25); }
.badge.bad { background:rgba(255,107,107,.15); color:#b23a2e; border-color:rgba(255,107,107,.25); }
.actions { display:flex; flex-wrap:wrap; gap:10px; margin-top:12px; }
.spend-grid { display:grid; grid-template-columns: 320px 1fr; gap:18px; }
.category-list { display:grid; gap:10px; }
.category { display:grid; grid-template-columns:40px 1fr auto; gap:10px; align-items:center; background:rgba(13,59,82,.08); border:1px solid rgba(13,59,82,.12); border-radius:16px; padding:10px; }
.category .cat-icon { font-size:25px; width:40px; height:40px; display:grid; place-items:center; border-radius:12px; background:rgba(13,59,82,.1); }
.assignment { background:rgba(13,59,82,.08); border:1px solid rgba(13,59,82,.12); border-radius:16px; padding:12px; display:grid; grid-template-columns: 1fr 170px 120px; gap:12px; align-items:center; margin-bottom:10px; }
.assignment select { width:100%; border:1px solid var(--line); background:var(--cloud); color:var(--ink); border-radius:12px; padding:10px; }
.summary-row { display:grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap:12px; }
.summary-tile { padding:15px; border-radius:18px; background:linear-gradient(180deg, rgba(53,168,255,.2), rgba(13,59,82,.06)); border:1px solid rgba(13,59,82,.12); }
.summary-tile .big { font-size:30px; font-weight:950; }
.summary-tile span { display:block; margin-top:2px; color:var(--muted); font-size:12px; font-weight:850; text-transform:uppercase; letter-spacing:.08em; }
.event-card { display:flex; gap:12px; align-items:center; border-radius:18px; padding:14px; border:1px solid rgba(13,59,82,.14); background:linear-gradient(135deg, rgba(155,107,255,.22), rgba(243,199,92,.12)); }
.event-card img { width:72px; height:72px; object-fit:contain; background:rgba(13,59,82,.08); border-radius:16px; padding:6px; }
.map-wrap { position:relative; min-height:315px; border-radius:22px; overflow:hidden; border:1px solid rgba(13,59,82,.12); background:#06162b; }
.map-wrap .map-bg { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:.7; }
.pin { position:absolute; transform:translate(-50%, -50%); background:rgba(13,59,82,.85); border:2px solid rgba(243,199,92,.75); border-radius:18px; padding:8px; width:106px; text-align:center; box-shadow:0 10px 25px rgba(0,0,0,.35); }
.pin.selected { transform:translate(-50%, -50%) scale(1.08); border-color:var(--gold); box-shadow:0 0 0 6px rgba(243,199,92,.14), 0 20px 35px rgba(0,0,0,.45); }
.pin img { height:56px; width:100%; object-fit:cover; border-radius:10px; margin-bottom:4px; }
.option-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap:12px; }
.option-card { background:rgba(13,59,82,.08); border:1px solid rgba(13,59,82,.14); border-radius:18px; padding:15px; min-height:120px; display:flex; flex-direction:column; justify-content:space-between; }
.option-card.selected { border-color:var(--gold); background:linear-gradient(135deg, rgba(243,199,92,.22), rgba(53,168,255,.09)); box-shadow: 0 0 0 2px rgba(243,199,92,.13); }
.results-score { font-size:72px; font-weight:1000; letter-spacing:-.04em; color:var(--gold); line-height:1; }
.log { max-height:270px; overflow:auto; padding-right:5px; display:grid; gap:8px; }
.log-entry { font-size:13px; line-height:1.4; color:var(--muted); padding:9px 10px; border-radius:13px; background:rgba(13,59,82,.06); border:1px solid rgba(13,59,82,.08); }
.table { width:100%; border-collapse:collapse; overflow:hidden; border-radius:16px; }
.table th, .table td { text-align:left; padding:12px; border-bottom:1px solid rgba(13,59,82,.09); }
.table th { color:var(--gold); font-size:12px; text-transform:uppercase; letter-spacing:.08em; }
.table tr.me { background:rgba(53,168,255,.14); }
.toast { position:fixed; right:20px; bottom:20px; z-index:20; width:min(380px, calc(100vw - 40px)); padding:14px 16px; border-radius:10px; background:var(--ocean); border:1px solid var(--sea); color:#ffffff; box-shadow:0 12px 30px rgba(11,74,110,.3); animation: pop .2s ease; }
.toast h4 { margin:0 0 4px; color:#ffffff; }
.toast p { margin:0; color:#c9e6f0; }
@keyframes pop { from { transform:translateY(8px); opacity:0; } to { transform:translateY(0); opacity:1; } }
.pulse { animation:pulse 1.2s ease-in-out infinite; }
@keyframes pulse { 50% { transform:scale(1.025); } }
.kbd { padding:2px 6px; border-radius:7px; background:rgba(13,59,82,.13); font-size:12px; }
.footer-note { color:var(--muted); font-size:12px; line-height:1.45; margin-top:10px; }
@media (max-width: 900px) {
  .app-shell { padding:14px; }
  .layout { grid-template-columns: 1fr; }
  .nav { position:relative; top:0; display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
  .nav-button { justify-content:center; text-align:center; flex-direction:column; gap:4px; padding:10px 8px; font-size:12px; }
  .resource-bar { grid-template-columns: repeat(2, 1fr); }
  .resource:last-child { grid-column: span 2; }
  .objective, .spend-grid, .grid-2 { grid-template-columns:1fr; }
  .assignment { grid-template-columns:1fr; }
  .topbar { align-items:flex-start; }
  .logo-title { font-size:28px; }
}
@media (max-width: 560px) {
  .resource-bar { grid-template-columns: 1fr; }
  .resource:last-child { grid-column:auto; }
  .grid-3, .grid-4 { grid-template-columns:1fr; }
  .screen-title { flex-direction:column; }
  .pin { width:86px; font-size:11px; }
}

.prototype-subtitle { color:var(--muted); font-weight:800; margin-top:5px; }
.boardgame-layout { grid-template-columns: 230px 1fr; }
.board-resource-bar { grid-template-columns: repeat(9, minmax(86px, 1fr)); }
.mini-resource { min-height:62px; padding:10px; border-radius:14px; }
.mini-resource .emoji { font-size:20px; width:24px; }
.mini-resource .value { font-size:17px; }
.resource-risk { border-color:rgba(255,107,107,.75); box-shadow:0 0 0 2px rgba(255,107,107,.12); }
.board-hero { background:var(--cloud); }
.board-event { margin-bottom:14px; background:linear-gradient(135deg, rgba(243,199,92,.2), rgba(41,211,194,.12)); }
.event-icon { width:48px; height:48px; border-radius:14px; display:grid; place-items:center; background:rgba(13,59,82,.12); font-size:24px; }
.event-card p { margin:4px 0 0; color:var(--muted); }
.route-map { min-height:430px; border-radius:20px; overflow:hidden; border:1px solid rgba(243,199,92,.25); background:#123047; box-shadow: inset 0 0 80px rgba(0,0,0,.28); }
.route-map svg { width:100%; height:100%; min-height:430px; display:block; }
.map-route { stroke-width:1.7; stroke-linecap:round; opacity:.72; stroke-dasharray:1.4 1.4; }
.map-route.player { stroke-width:3; opacity:1; stroke-dasharray:none; }
.map-route.rival { stroke-width:2.2; opacity:.75; stroke-dasharray:2 2; }
.map-city circle { fill:#f8f1da; stroke:#10213a; stroke-width:.7; }
.map-city.reached circle { fill:var(--gold); stroke:#fff3c6; }
.map-city text { fill:#f7fbff; font-size:3px; font-weight:800; paint-order:stroke; stroke:#06162b; stroke-width:.7; text-anchor:middle; pointer-events:none; }
.route-list { display:grid; gap:10px; max-height:560px; overflow:auto; padding-right:4px; }
.route-card { display:grid; grid-template-columns:1fr auto; gap:12px; align-items:center; padding:12px; border-radius:15px; border:1px solid rgba(13,59,82,.13); background:rgba(13,59,82,.07); }
.route-card.player { background:rgba(243,199,92,.14); border-color:rgba(243,199,92,.36); }
.route-card.rival { opacity:.72; background:rgba(13,59,82,.04); }
.route-title { font-weight:950; }
.route-meta { color:var(--muted); font-size:12px; margin-top:4px; }
.route-payments { display:flex; flex-wrap:wrap; justify-content:flex-end; gap:6px; }
.compact { padding:8px 10px; border-radius:11px; font-size:12px; box-shadow:none; }
.journey-card, .account-row, .spend-cube, .experience-card, .partner-card, .strategy-card, .bucket-card { border:1px solid rgba(13,59,82,.13); background:rgba(13,59,82,.075); border-radius:18px; padding:14px; }
.section-heading { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; margin-bottom:14px; }
.section-heading h2 { margin:0; }
.section-heading p { margin:5px 0 0; color:var(--muted); line-height:1.4; }
.journey-card { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:10px; }
.journey-card p, .strategy-card p, .partner-card p, .experience-card p, .account-row p, .bucket-card p, .spend-cube p { margin:5px 0 0; color:var(--muted); line-height:1.4; }
.journey-card.complete { border-color:rgba(89,211,125,.42); background:rgba(89,211,125,.1); }
.section-spacer { margin-top:20px!important; }
.bucket-card { background:linear-gradient(180deg, rgba(243,199,92,.14), rgba(13,59,82,.055)); }
.milestone { display:grid; grid-template-columns:26px 1fr; gap:8px; align-items:start; padding:9px 0; border-top:1px solid rgba(13,59,82,.1); color:var(--muted); }
.milestone.complete { color:#1a7d4f; }
.mini-list { display:grid; gap:7px; margin-top:10px; }
.mini-line { display:flex; justify-content:space-between; gap:10px; color:var(--muted); font-size:13px; line-height:1.35; border-top:1px solid rgba(13,59,82,.08); padding-top:8px; margin-top:8px; }
.mini-line.done { color:#1a7d4f; }
.draft-grid, .partner-grid, .experience-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(230px, 1fr)); gap:14px; }
.strategy-card { display:flex; flex-direction:column; gap:10px; min-height:260px; }
.strategy-card.selected { border-color:rgba(243,199,92,.72); background:linear-gradient(180deg, rgba(243,199,92,.19), rgba(13,59,82,.075)); box-shadow:0 0 0 2px rgba(243,199,92,.12); }
.strategy-card-head { display:flex; justify-content:space-between; gap:10px; align-items:flex-start; }
.strategy-card h3, .partner-card h3, .experience-card h3, .spend-cube h3 { margin:0; }
.draft-selection-panel { display:grid; grid-template-columns:minmax(180px, .9fr) minmax(240px, 1.4fr) auto; gap:14px; align-items:center; padding:14px; margin:18px 0; border-radius:8px; border:1px solid rgba(243,199,92,.28); background:linear-gradient(135deg, rgba(243,199,92,.14), rgba(53,168,255,.08)); }
.draft-selection-panel h2 { margin:3px 0 4px; }
.draft-selection-panel p { margin:0; color:var(--muted); line-height:1.4; }
.selected-draft-list { display:grid; gap:8px; }
.selected-draft-card { width:100%; display:flex; justify-content:space-between; align-items:center; gap:12px; text-align:left; padding:10px 12px; border-radius:8px; border:1px solid rgba(243,199,92,.35); background:rgba(13,59,82,.09); color:var(--text); box-shadow:none; }
.selected-draft-card strong, .selected-draft-card small { display:block; }
.selected-draft-card small { margin-top:3px; color:var(--muted); font-size:12px; }
.selected-draft-card > span:last-child { color:var(--sun-ink); font-size:12px; font-weight:950; text-transform:uppercase; letter-spacing:.06em; white-space:nowrap; }
.empty-selection { padding:12px; border:1px dashed rgba(13,59,82,.24); border-radius:8px; color:var(--muted); background:rgba(13,59,82,.045); }
.draft-selection-actions { display:flex; flex-wrap:wrap; justify-content:flex-end; gap:8px; }
.board-credit-card { min-height:210px; }
.spend-wallet { display:grid; grid-template-columns:minmax(160px, .7fr) 1fr; gap:14px; align-items:center; margin:16px 0; padding:14px; border-radius:8px; border:1px solid rgba(13,59,82,.13); background:rgba(13,59,82,.065); }
.spend-wallet strong { display:block; margin-top:3px; color:var(--sun-ink); }
.spend-wallet-cards { display:grid; grid-template-columns:repeat(auto-fit, minmax(170px, 1fr)); gap:9px; }
.spend-wallet-card { padding:10px 11px; border-radius:8px; border:1px solid rgba(243,199,92,.24); background:rgba(243,199,92,.11); }
.spend-wallet-card strong { margin:0; color:var(--ink); }
.spend-wallet-card span { display:block; margin-top:4px; color:var(--muted); font-size:12px; line-height:1.3; }
.spend-board { display:grid; gap:12px; }
.spend-cube { display:grid; grid-template-columns:104px 1fr minmax(190px, 250px) minmax(190px, 260px); gap:12px; align-items:center; }
.spend-cube select { width:100%; border:1px solid var(--line); background:var(--cloud); color:var(--ink); border-radius:12px; padding:10px; }
.purchase-amount { min-height:58px; display:grid; place-items:center; border-radius:8px; color:#162227; background:linear-gradient(135deg, #f0c15f, #e7e7bd); font-weight:1000; font-size:20px; white-space:nowrap; }
.reward-preview { display:grid; gap:3px; color:var(--sun-ink); font-size:13px; font-weight:850; text-align:right; }
.reward-preview strong, .reward-preview span, .reward-preview small { display:block; }
.reward-preview span { color:var(--sun-ink); }
.reward-preview small { color:var(--muted); font-size:11px; line-height:1.25; }
.cube-count { color:var(--sun-ink); font-size:12px; font-weight:850; margin-left:6px; white-space:nowrap; }
.account-guidance { display:grid; grid-template-columns:1.4fr minmax(250px, .8fr); gap:14px; margin:14px 0 18px; }
.account-choice-grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; }
.account-choice-grid div, .account-next-panel { padding:13px; border-radius:8px; border:1px solid rgba(13,59,82,.13); background:rgba(13,59,82,.075); }
.account-choice-grid strong { display:block; margin-bottom:5px; color:var(--sun-ink); }
.account-choice-grid span, .account-next-panel p { color:var(--muted); font-size:13px; line-height:1.4; }
.account-next-panel { display:grid; gap:12px; align-content:space-between; border-color:rgba(243,199,92,.28); background:linear-gradient(135deg, rgba(243,199,92,.13), rgba(53,168,255,.08)); }
.account-next-panel h2 { margin:3px 0 5px; }
.account-list { display:grid; gap:12px; }
.account-row { display:grid; grid-template-columns:1fr auto auto; gap:14px; align-items:center; }
.account-row.closed { opacity:.55; }
.account-stats, .account-actions { display:flex; flex-wrap:wrap; gap:8px; justify-content:flex-end; }
.partner-card { min-height:230px; border-width:2px; }
.partner-card.selected { background:linear-gradient(180deg, rgba(243,199,92,.16), rgba(13,59,82,.075)); box-shadow:0 0 0 2px rgba(243,199,92,.12); }
.partner-icon { font-size:38px; font-weight:1000; line-height:1; }
.transfer-selection-panel { display:flex; justify-content:space-between; gap:14px; align-items:center; padding:14px; margin:18px 0; border-radius:8px; border:1px solid rgba(243,199,92,.28); background:linear-gradient(135deg, rgba(243,199,92,.14), rgba(53,168,255,.08)); }
.transfer-selection-panel h2 { margin:3px 0 4px; }
.transfer-selection-panel p { margin:0; color:var(--muted); line-height:1.4; }
.experience-card { display:flex; flex-direction:column; gap:8px; min-height:210px; }
.experience-card.done { background:rgba(89,211,125,.1); border-color:rgba(89,211,125,.4); }
.experience-city { color:var(--gold); font-size:12px; font-weight:950; text-transform:uppercase; letter-spacing:.08em; }
.result-panel h1 { font-size:clamp(58px, 12vw, 118px); line-height:.9; color:#195839; margin:12px 0; }
.result-panel p { color:#33445d; font-size:18px; max-width:720px; }
.score-grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:12px; margin:20px 0; }
.score-grid div, .vision-grid div { border-radius:16px; padding:16px; background:rgba(13,59,82,.08); border:1px solid rgba(13,59,82,.14); }
.score-grid strong { display:block; color:#123b2a; font-size:34px; }
.score-grid span, .vision-grid span { display:block; color:#465a74; margin-top:4px; }
.vision-grid { margin-top:20px; }
.paper .eyebrow, .rules-modal .eyebrow { color:#805612; }

.experience-row { border-top: 1px solid rgba(13,59,82,.12); padding-top: 16px; margin-top: 16px; }
.row-heading { display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin-bottom:10px; }
.row-heading h2 { margin:0; }
.row-heading span { color:var(--sun-ink); font-weight:900; font-size:13px; text-transform:uppercase; letter-spacing:.08em; }
.row-cards { grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); }
.experience-card.band-everyday { border-color:rgba(103,189,114,.32); background:linear-gradient(180deg, rgba(103,189,114,.14), rgba(13,59,82,.06)); }
.experience-card.band-premium { border-color:rgba(58,154,199,.34); background:linear-gradient(180deg, rgba(58,154,199,.15), rgba(13,59,82,.06)); }
.experience-card.band-dream { border-color:rgba(240,193,95,.42); background:linear-gradient(180deg, rgba(240,193,95,.18), rgba(166,119,200,.08)); }
.experience-card .actions { margin-top:auto; }
.cat-icon { width:44px; height:44px; display:grid; place-items:center; border-radius:8px; color:#162227; background:linear-gradient(135deg, #f0c15f, #e7e7bd); font-weight:1000; }
.setup-grid { display:grid; grid-template-columns: repeat(4, minmax(150px, 1fr)); gap:12px; align-items:end; }
.setup-control { display:flex; flex-direction:column; gap:7px; padding:13px; border-radius:8px; background:rgba(13,59,82,.075); border:1px solid rgba(13,59,82,.13); color:var(--muted); font-weight:850; }
.setup-control select { width:100%; border:1px solid var(--line); background:var(--cloud); color:var(--ink); border-radius:8px; padding:10px; }
.setup-control strong { font-size:28px; color:var(--gold); }
/* Setup controls sit on the light "paper" hero → use dark ink, not the dark-theme light-blue. */
.paper .setup-control { color:var(--ink); background:rgba(13,59,82,.06); border-color:rgba(13,59,82,.16); }
.paper .setup-control select { background:#ffffff; color:var(--ink); border-color:rgba(13,59,82,.24); }
.paper .setup-control strong { color:#9a6a15; }
.seat-list { display:grid; gap:8px; }
.sim-table td span { color:var(--muted); font-size:12px; line-height:1.3; }
.opponent-grid { display:grid; gap:10px; }
.opponent-card { display:grid; gap:8px; padding:12px; border-radius:8px; background:rgba(13,59,82,.075); border:1px solid rgba(13,59,82,.13); }
.opponent-card.you { border-color:rgba(240,193,95,.44); background:linear-gradient(180deg, rgba(240,193,95,.14), rgba(13,59,82,.06)); }
.opponent-card.leading { border-color:rgba(220,102,95,.42); }
.opponent-card.close { border-color:rgba(240,193,95,.34); }
.opponent-card.behind { border-color:rgba(103,189,114,.28); }
.opponent-card p { margin:3px 0 0; color:var(--muted); font-size:12px; line-height:1.35; }
.opponent-score { justify-self:start; display:flex; align-items:baseline; gap:5px; color:var(--gold); font-size:30px; font-weight:1000; line-height:1; }
.opponent-score span { color:var(--muted); font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:.08em; }
.turn-guide { display:grid; grid-template-columns: minmax(220px, 1fr) minmax(260px, 1.2fr) auto; gap:14px; align-items:center; padding:14px; border-radius:8px; background:rgba(13,59,82,.08); border:1px solid rgba(240,193,95,.26); margin:14px 0; }
.turn-guide h2 { margin:2px 0 4px; }
.turn-guide p { margin:0; color:var(--muted); line-height:1.4; }
.phase-rail { display:grid; grid-template-columns: repeat(4, 1fr); gap:6px; }
.phase-rail span { min-height:38px; display:grid; place-items:center; text-align:center; padding:7px; border-radius:8px; background:rgba(13,59,82,.07); border:1px solid rgba(13,59,82,.12); color:var(--muted); font-size:12px; font-weight:900; }
.phase-rail span.active { color:#142126; background:linear-gradient(135deg, #f0c15f, #e7e7bd); }
.phase-rail span.done { color:#1a7d4f; border-color:rgba(103,189,114,.34); background:rgba(103,189,114,.12); }
.board-reference { display:grid; grid-template-columns: 1.3fr repeat(4, minmax(130px, 1fr)); gap:10px; align-items:stretch; margin:14px 0; }
.board-reference > div { padding:12px; border-radius:8px; background:rgba(13,59,82,.07); border:1px solid rgba(13,59,82,.12); }
.board-reference p { margin:5px 0 0; color:var(--muted); font-size:12px; line-height:1.35; }
.reference-row { display:flex; flex-direction:column; justify-content:space-between; gap:7px; }
.reference-row span { color:var(--muted); font-size:12px; font-weight:850; }
.reference-row strong { color:var(--sun-ink); font-size:13px; line-height:1.3; }
.claim-list { margin:2px 0 0; padding-left:18px; color:var(--muted); font-size:12px; line-height:1.4; }
.claim-list strong { color:var(--sun-ink); }
.rules-backdrop { position:fixed; inset:0; z-index:40; display:grid; place-items:center; padding:18px; background:rgba(7,12,17,.72); backdrop-filter: blur(8px); }
.rules-modal { position:relative; width:min(760px, 100%); max-height:min(760px, calc(100vh - 36px)); overflow:auto; border-radius:8px; background:linear-gradient(180deg, #fff9ed, #eef2e1); color:var(--ink); border:1px solid rgba(240,193,95,.8); box-shadow:0 24px 80px rgba(0,0,0,.45); padding:18px; }
.rules-close-button { position:sticky; top:0; float:right; z-index:2; width:40px; height:40px; display:grid; place-items:center; border:1px solid rgba(13,59,82,.2); border-radius:999px; background:#253941; color:#fff9ed; font-size:24px; line-height:1; font-weight:900; box-shadow:0 10px 22px rgba(13,59,82,.22); }
.rules-head { display:flex; justify-content:space-between; gap:14px; align-items:flex-start; border-bottom:1px solid rgba(13,59,82,.14); padding:2px 48px 12px 0; }
.rules-head h2 { margin:2px 0 4px; font-size:28px; }
.rules-head p { margin:0; color:#4a5f63; line-height:1.4; }
.rules-tabs { display:flex; flex-wrap:wrap; gap:8px; margin:14px 0; }
.rules-tabs button { border:1px solid rgba(13,59,82,.16); background:rgba(13,59,82,.06); color:#253941; border-radius:999px; padding:8px 11px; font-size:12px; font-weight:900; text-transform:capitalize; }
.rules-tabs button.active { background:#253941; color:#fff9ed; border-color:#253941; }
.rules-body { display:grid; gap:14px; }
.rules-body ul { margin:0; padding-left:22px; display:grid; gap:10px; line-height:1.45; }
.rules-tip { display:grid; grid-template-columns:auto 1fr; gap:10px; padding:13px; border-radius:8px; background:rgba(240,193,95,.2); border:1px solid rgba(169,120,44,.24); }
.rules-tip strong { color:#805612; }
.rules-tip span { color:#314a4d; line-height:1.4; }
.rules-footer { position:sticky; bottom:-18px; display:flex; justify-content:flex-end; margin:16px -18px -18px; padding:12px 18px; background:linear-gradient(180deg, rgba(238,242,225,.74), #eef2e1); border-top:1px solid rgba(13,59,82,.12); }
.rules-done-button { border:0; border-radius:8px; padding:11px 18px; background:#253941; color:#fff9ed; font-weight:950; box-shadow:0 10px 22px rgba(13,59,82,.2); }

@media (max-width: 1080px) {
  .board-resource-bar { grid-template-columns: repeat(3, 1fr); }
  .boardgame-layout { grid-template-columns:1fr; }
  .route-map, .route-map svg { min-height:360px; }
  .turn-guide { grid-template-columns:1fr; }
  .board-reference { grid-template-columns:1fr 1fr; }
  .draft-selection-panel { grid-template-columns:1fr; align-items:stretch; }
  .draft-selection-actions { justify-content:flex-start; }
  .account-guidance, .account-choice-grid { grid-template-columns:1fr; }
}

@media (max-width: 760px) {
  .board-resource-bar { grid-template-columns: repeat(2, 1fr); }
  .spend-cube, .account-row, .route-card { grid-template-columns:1fr; }
  .spend-wallet { grid-template-columns:1fr; }
  .reward-preview { text-align:left; }
  .account-stats, .account-actions, .route-payments { justify-content:flex-start; }
  .route-map, .route-map svg { min-height:300px; }
  .score-grid { grid-template-columns:1fr; }
  .setup-grid { grid-template-columns:1fr; }
  .phase-rail, .board-reference { grid-template-columns:1fr; }
  .transfer-selection-panel { display:grid; align-items:stretch; }
  .rules-head, .rules-tip { grid-template-columns:1fr; display:grid; }
}

/* ===== v0.3 turn-based UI ===== */
.board-resource-bar { grid-template-columns: repeat(6, minmax(96px, 1fr)); }

/* Persistent shared board (always visible, physical-board style) */
.game-board { background:var(--cloud-2); border:1px solid var(--line); border-radius:var(--radius); padding:16px; margin-bottom:14px; box-shadow:var(--shadow); position:relative; }
.trail-wrap { margin-bottom:14px; }
.trail-header { display:flex; justify-content:space-between; gap:14px; align-items:flex-start; margin-bottom:12px; flex-wrap:wrap; }
.trail-header h2 { margin:3px 0 0; }
.trail-event { display:flex; gap:10px; align-items:center; background:linear-gradient(135deg, rgba(243,199,92,.2), rgba(41,211,194,.12)); border:1px solid rgba(243,199,92,.3); border-radius:14px; padding:8px 12px; max-width:520px; }
.trail-event-icon { width:30px; height:30px; border-radius:9px; display:grid; place-items:center; background:rgba(13,59,82,.14); font-weight:900; }
.trail-event strong { display:block; } .trail-event span { color:var(--muted); font-size:12px; line-height:1.3; }
.trail { display:flex; align-items:stretch; gap:8px; overflow-x:auto; padding-bottom:6px; }
.trail-year { flex:1; min-width:190px; border:1px solid rgba(13,59,82,.12); border-radius:14px; padding:10px 12px; background:rgba(13,59,82,.04); }
.trail-year.current { border-color:rgba(99,213,129,.5); background:rgba(99,213,129,.09); }
.trail-year.past { opacity:.65; }
.trail-year-head { font-weight:900; font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:var(--sun-ink); margin-bottom:10px; }
.trail-stops { display:flex; justify-content:space-between; gap:6px; }
.trail-stops.months { gap:3px; flex-wrap:nowrap; }
.trail-stops.months .stop { padding-top:14px; }
.trail-stops.months .stop-dot { width:12px; height:12px; border-width:1.5px; }
.season-dots { flex-wrap:wrap; max-width:160px; justify-content:flex-end; }
.season-dots span { width:10px; height:10px; }
.stop { flex:1; display:flex; flex-direction:column; align-items:center; gap:5px; position:relative; padding-top:14px; }
.stop-dot { width:18px; height:18px; border-radius:50%; background:rgba(13,59,82,.13); border:2px solid rgba(13,59,82,.22); }
.stop.done .stop-dot { background:linear-gradient(135deg,#63d581,#2fae65); border-color:#1a7d4f; }
.stop.now .stop-dot { background:linear-gradient(135deg,#f0c15f,#e7e7bd); border-color:var(--sun-ink); box-shadow:0 0 0 4px rgba(240,193,95,.2); }
.stop-label { font-size:11px; color:var(--muted); font-weight:800; }
.pawn { position:absolute; top:0; color:var(--gold); font-size:13px; }
.trail-link { align-self:center; width:14px; height:2px; background:rgba(13,59,82,.2); }

.tabbar { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px; background:rgba(13,59,82,.6); border:1px solid rgba(13,59,82,.1); border-radius:14px; padding:6px; position:sticky; top:8px; z-index:5; }
.tab { display:flex; align-items:center; gap:7px; background:transparent; border:0; color:var(--muted); border-radius:10px; padding:9px 13px; font-weight:850; font-size:13px; box-shadow:none; }
.tab span { font-size:16px; }
.tab:hover { background:rgba(13,59,82,.08); transform:none; }
.tab.active { background:linear-gradient(135deg, rgba(243,199,92,.24), rgba(53,168,255,.18)); color:var(--ink); }
.content-below { min-width:0; }
.game-board .turn-panel, .game-board .player-strip { margin-bottom:0; }
.game-board .turn-panel { margin-bottom:14px; }
.game-board .activity-banner { margin:0 0 14px; }
.game-board .strip-head { margin-top:4px; }
.res-sub { font-size:11px; font-weight:800; color:var(--muted); margin-top:1px; }

.turn-panel { border:1px solid var(--line); background:var(--cloud); border-radius:var(--radius); padding:16px 18px; margin-bottom:16px; box-shadow:var(--shadow); }
.turn-panel.your-turn { border-color:rgba(99,213,129,.55); box-shadow:0 0 0 2px rgba(99,213,129,.14), var(--shadow); }
.turn-panel.spent-turn { border-color:rgba(240,193,95,.6); box-shadow:0 0 0 2px rgba(240,193,95,.18), var(--shadow); }
.turn-head { display:flex; justify-content:space-between; align-items:flex-start; gap:14px; }
.turn-head h2 { margin:3px 0 4px; }
.turn-head p { margin:0; color:var(--muted); line-height:1.4; }
.season-dots { display:flex; gap:6px; padding-top:6px; }
.season-dots span { width:14px; height:14px; border-radius:50%; background:rgba(13,59,82,.14); border:1px solid rgba(13,59,82,.2); }
.season-dots span.active { background:linear-gradient(135deg,#f0c15f,#e7e7bd); border-color:var(--gold); }
.season-dots span.done { background:rgba(99,213,129,.6); border-color:rgba(99,213,129,.7); }
.action-row { display:grid; grid-template-columns:repeat(auto-fit, minmax(150px,1fr)); gap:10px; margin-top:14px; }
.action-button { display:flex; flex-direction:column; gap:3px; text-align:left; padding:12px 14px; border-radius:14px; border:1px solid rgba(13,59,82,.16); background:rgba(13,59,82,.07); color:var(--text); box-shadow:none; }
.action-button:hover { background:rgba(13,59,82,.13); transform:translateY(-1px); }
.action-button strong { font-size:15px; }
.action-button span { color:var(--muted); font-size:12px; }
.action-button.plan { border-style:dashed; }

.turn-head-right { display:grid; gap:8px; justify-items:end; }
.actions-left { display:flex; align-items:center; gap:6px; }
.actions-left span { width:12px; height:12px; border-radius:50%; }
.actions-left span.live { background:linear-gradient(135deg,#63d581,#2fae65); }
.actions-left span.spent { background:rgba(13,59,82,.14); border:1px solid rgba(13,59,82,.2); }
.actions-left em { font-style:normal; font-size:12px; font-weight:800; color:var(--muted); margin-left:4px; }
.turn-foot { display:flex; align-items:center; gap:12px; margin-top:12px; padding-top:12px; border-top:1px solid rgba(13,59,82,.1); }
.turn-foot span { color:var(--muted); font-size:12px; }

.strip-head { display:flex; align-items:center; justify-content:space-between; gap:12px; margin:4px 0 8px; }
.strip-head h2 { margin:0; }

.goal-options { display:flex; flex-wrap:wrap; gap:6px; align-items:center; margin:2px 0; }
.goal-options-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; width:100%; }
.goal-option { font-size:12px; font-weight:800; padding:4px 9px; border-radius:999px; background:rgba(13,59,82,.08); border:1px solid rgba(13,59,82,.16); color:var(--muted); }
.goal-option.ok { background:rgba(99,213,129,.16); border-color:rgba(99,213,129,.4); color:#1a7d4f; }

.paycheck-banner { display:flex; align-items:center; gap:16px; flex-wrap:wrap; margin:0 0 16px; padding:14px 16px; border-radius:14px; border:1px solid rgba(99,213,129,.4); background:linear-gradient(135deg, rgba(99,213,129,.16), rgba(240,193,95,.1)); }
.paycheck-amt { display:flex; flex-direction:column; }
.paycheck-amt span { font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:#1a7d4f; font-weight:800; }
.paycheck-amt strong { font-size:30px; font-weight:1000; color:#1a7d4f; line-height:1; }
.paycheck-note { flex:1; min-width:200px; color:var(--muted); font-size:13px; line-height:1.4; }

.character-stats { display:grid; grid-template-columns:1fr 1fr; gap:8px; }

.character-stats .wide { grid-column:1 / -1; }
.character-stats span { display:block; font-size:10px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); }
.character-stats strong { font-size:14px; color:var(--ink); font-family:var(--font-mono); font-variant-numeric:tabular-nums; }
.character-skill { background:rgba(240,193,95,.14); border:1px solid rgba(240,193,95,.34); border-radius:12px; padding:10px 12px; color:var(--sun-ink); font-size:12.5px; line-height:1.4; }
.character-skill span { display:block; font-weight:900; color:var(--sun-ink); margin-bottom:3px; }
.character-card .primary-button { margin-top:auto; }

.players-full { display:grid; grid-template-columns:repeat(auto-fit, minmax(280px,1fr)); gap:14px; }
.player-full { border:1px solid rgba(13,59,82,.13); background:rgba(13,59,82,.07); border-radius:16px; padding:15px; display:grid; gap:11px; }
.player-full.you { border-color:rgba(240,193,95,.4); background:linear-gradient(180deg, rgba(240,193,95,.12), rgba(13,59,82,.05)); }

.player-full-head { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
.player-full-head strong { display:inline-block; margin-right:6px; }
.rank-chip { display:inline-grid; place-items:center; min-width:26px; height:26px; border-radius:8px; background:rgba(240,193,95,.2); color:var(--sun-ink); font-weight:900; font-size:13px; margin-right:8px; }
.point-row { display:grid; grid-template-columns:repeat(3, 1fr); gap:7px; }
.point-chip { background:rgba(13,59,82,.3); border-radius:10px; padding:7px 9px; display:grid; gap:2px; }
.point-chip span { font-size:11px; color:var(--muted); }
.point-chip strong { font-size:14px; color:var(--ink); }

.activity-banner { border:1px solid rgba(58,154,199,.4); background:linear-gradient(135deg, rgba(58,154,199,.16), rgba(13,59,82,.05)); border-radius:var(--radius); padding:12px 16px; margin-bottom:16px; }
.activity-banner strong { color:var(--muted); text-transform:uppercase; font-size:12px; letter-spacing:.1em; }
.activity-banner ul { margin:8px 0 0; padding-left:18px; display:grid; gap:5px; }
.activity-banner li { color:var(--muted); font-size:13px; line-height:1.35; }

.player-strip { display:grid; grid-template-columns:repeat(auto-fit, minmax(220px,1fr)); gap:12px; margin-bottom:16px; }
.status-card { border:1px solid rgba(13,59,82,.13); background:rgba(13,59,82,.07); border-radius:16px; padding:13px; display:grid; gap:9px; }
.status-card.you { border-color:rgba(240,193,95,.4); background:linear-gradient(180deg, rgba(240,193,95,.12), rgba(13,59,82,.05)); }
.status-card.active-turn { box-shadow:0 0 0 2px rgba(99,213,129,.4); }
.status-top { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
.status-top strong { display:block; }
.status-sub { color:var(--muted); font-size:12px; }
.status-lp { font-size:26px; font-weight:1000; color:var(--gold); line-height:1; display:flex; align-items:baseline; gap:4px; }
.status-lp span { font-size:11px; font-weight:900; color:var(--muted); text-transform:uppercase; }
.lp-bars { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
.lp-bar { background:rgba(13,59,82,.3); border-radius:10px; padding:6px 4px; text-align:center; }
.lp-bar-label { display:block; font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; }
.lp-bar strong { font-size:15px; color:var(--ink); }
.status-foot { display:flex; justify-content:space-between; align-items:center; gap:8px; }
.status-meta { color:var(--muted); font-size:12px; }
.status-meta .risk { color:#b23a2e; font-weight:800; }
.status-last { font-size:12px; color:var(--muted); border-top:1px solid rgba(13,59,82,.1); padding-top:7px; }
.status-intent { font-size:12px; font-weight:800; color:var(--muted); background:rgba(58,154,199,.16); border:1px solid rgba(58,154,199,.34); border-radius:9px; padding:5px 8px; line-height:1.3; }
.status-intent.urgent { color:var(--sun-ink); background:rgba(240,193,95,.18); border-color:rgba(240,193,95,.45); }

.results-table { display:grid; gap:8px; margin:18px 0; }
.result-row { display:grid; grid-template-columns:32px 1fr auto auto; gap:12px; align-items:center; padding:12px 14px; border-radius:14px; background:rgba(13,59,82,.08); border:1px solid rgba(13,59,82,.14); color:#1a2a3a; }
.result-row.you { background:rgba(53,168,255,.16); border-color:rgba(53,168,255,.32); }
.result-rank { font-weight:1000; font-size:20px; color:#805612; }
.result-name { font-weight:900; }
.result-detail { color:#4a5f63; font-size:12px; }
.result-total { font-weight:1000; font-size:20px; color:#195839; }
.pass-modal { text-align:center; max-width:440px; }
.pass-modal h2 { font-size:26px; margin:8px 0; }

@media (max-width: 760px) {
  .board-resource-bar { grid-template-columns: repeat(2, 1fr); }
  .lp-bars { grid-template-columns:repeat(2,1fr); }
  .turn-head { flex-direction:column; }
  .result-row { grid-template-columns:28px 1fr auto; }
  .result-detail { display:none; }
}

/* ===== Onboarding coach · achievements · starter gating ===== */
.coach-modal { position:relative; width:min(460px, 100%); border-radius:16px; padding:22px 20px 18px; background:linear-gradient(180deg, #1b3138, #12202a); border:1px solid rgba(240,193,95,.42); box-shadow:0 24px 80px rgba(0,0,0,.5); color:var(--text); }
.coach-eyebrow { color:var(--gold); text-transform:uppercase; font-size:11px; font-weight:900; letter-spacing:.12em; margin-bottom:6px; }
.coach-modal h2 { margin:0 0 8px; font-size:21px; }
.coach-modal p { margin:0; color:var(--muted); line-height:1.5; font-size:14px; }
.coach-dots { display:flex; gap:6px; margin:16px 0; }
.coach-dots span { width:8px; height:8px; border-radius:50%; background:rgba(13,59,82,.2); }
.coach-dots span.on { background:var(--gold); }
.coach-foot { display:flex; justify-content:space-between; align-items:center; gap:10px; }
.coach-foot-right { display:flex; gap:8px; }

.achievements-modal .ach-list { display:grid; gap:8px; }
.ach-group-label { color:#805612; text-transform:uppercase; font-size:11px; font-weight:900; letter-spacing:.1em; margin-top:12px; }
.ach-item { display:flex; gap:12px; align-items:flex-start; padding:10px 12px; border-radius:12px; border:1px solid rgba(13,59,82,.14); background:rgba(13,59,82,.05); }
.ach-item.done { border-color:rgba(169,120,44,.55); background:rgba(240,193,95,.2); }
.ach-item.locked { opacity:.6; }
.ach-badge { font-size:20px; line-height:1.1; }
.ach-item strong { display:block; color:var(--ink); }
.ach-item span { display:block; font-size:12.5px; color:#5a6b64; margin-top:2px; }

.starter-flag { margin:0 !important; background:rgba(103,189,114,.92); color:#06210f; font-weight:900; font-size:11px; letter-spacing:.03em; text-align:center; padding:5px; text-transform:uppercase; }
.character-card.locked { opacity:.72; }
.character-locked { text-align:center; font-weight:800; color:var(--muted); background:rgba(13,59,82,.05); border:1px dashed rgba(13,59,82,.22); border-radius:12px; padding:12px; margin-top:auto; }
.result-unlock { margin:12px 0 4px; padding:10px 12px; border-radius:12px; background:rgba(240,193,95,.16); border:1px solid rgba(169,120,44,.5); color:#7a5312; font-weight:800; }
.guide-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }

/* ============================================================
   MOBILE LAYER (phones, <=600px): fit one card per screen and
   swipe sideways instead of scrolling down; the in-game board
   keeps resources + turn + actions in the first screen.
   ============================================================ */
@media (max-width: 600px) {
  html, body { overflow-x:clip; max-width:100%; overscroll-behavior:none; }
  .app-shell { padding:10px; overflow-x:clip; max-width:100%; }
  .card-panel { padding:14px; margin-bottom:12px; }
  .card-panel h1 { font-size:19px; line-height:1.15; margin-bottom:8px; }
  .card-panel > p, .card-panel.paper p { font-size:12.5px; line-height:1.4; }
  .eyebrow { font-size:11px; }

  /* card grids -> horizontal swipe carousels; peek the next card as an affordance */
  .character-grid, .draft-grid, .experience-grid, .partner-grid, .player-strip {
    display:flex; grid-template-columns:none; flex-wrap:nowrap; align-items:stretch;
    gap:12px; margin:4px 0 8px; padding:2px 2px 14px;
    overflow-x:auto; overflow-y:visible; -webkit-overflow-scrolling:touch;
    scroll-snap-type:x mandatory; scroll-padding-left:10px; scrollbar-width:none;
    overscroll-behavior-x:contain;
  }
  .character-grid::-webkit-scrollbar, .draft-grid::-webkit-scrollbar,
  .experience-grid::-webkit-scrollbar, .partner-grid::-webkit-scrollbar,
  .player-strip::-webkit-scrollbar { display:none; }
  .character-card, .draft-grid > *, .experience-grid > *, .partner-grid > *, .player-strip > * {
    flex:0 0 87%; scroll-snap-align:center;
  }

  /* condense the character card so the whole card fits without vertical scroll */
  .character-emoji, .character-portrait { width:46px; height:46px; border-radius:12px; font-size:24px; }
  .character-top { padding:12px 14px; gap:12px; }
  .character-name { font-size:19px; }
  .character-title { font-size:11px; }
  .character-tagline { min-height:0; font-size:12.5px; }
  .character-intro { display:none; }
  .character-card { gap:9px; padding-bottom:12px; }
  .character-stats { gap:6px; }
  .character-stats div { padding:6px 8px; border-radius:8px; }
  .character-stats strong { font-size:13px; }
  .character-skill { padding:8px 10px; font-size:11.5px; }

  /* section header + its action button: wrap instead of squishing */
  .section-heading, .screen-title { flex-wrap:wrap; gap:10px; }
  .section-heading > .primary-button, .screen-title > .primary-button { width:100%; }

  /* ---- IN-GAME BOARD: fit resources + turn + actions in the FIRST screen ---- */
  .topbar { flex-direction:column; align-items:stretch; gap:7px; margin-bottom:8px; }
  .logo-icon { width:34px; height:34px; }
  .logo-title { font-size:19px; }
  .prototype-subtitle { font-size:11px; }
  /* tidy 3-up grid so the 5 buttons wrap evenly (Reset never lands alone on a row) */
  .top-actions { display:grid; grid-template-columns:repeat(3, 1fr); gap:6px; }
  .top-actions button { padding:8px 8px; font-size:12px; text-align:center; }

  .resource-bar, .board-resource-bar { grid-template-columns:repeat(3,1fr); gap:6px; margin:6px 0 8px; }
  .resource.mini-resource { padding:6px 8px; gap:6px; }
  .resource .emoji { font-size:15px; }
  .resource .value { font-size:13px; }
  .resource .label { font-size:9px; }
  .res-sub { font-size:9px; }

  /* hoist the turn panel (your actions) above the trail + players */
  .game-board { display:flex; flex-direction:column; padding:11px; margin-bottom:10px; }
  .game-board > .turn-panel { order:-1; }
  .trail-wrap { margin-bottom:8px; }
  .trail-wrap .trail { display:none; }

  .turn-panel { padding:11px 12px; }
  .turn-head { flex-direction:column; gap:6px; }
  .turn-head h2 { font-size:17px; }
  .turn-head p { display:none; }
  .action-row { grid-template-columns:repeat(2,1fr); gap:7px; margin-top:10px; }
  .action-button { padding:8px 10px; min-height:0; }
  .action-button span { display:none; }
  .turn-foot { margin-top:10px; }

  /* sticky tab bar: opaque so scrolled content doesn't bleed through */
  .tabbar { background:#0a1826; border-color:rgba(13,59,82,.16); }

  .experience-card { min-height:0; }
  .experience-row { padding-top:12px; margin-top:12px; }
  .row-heading h2 { font-size:16px; }
  .status-card { padding:11px; }
}

/* ===== Single fixed bottom menu: consolidates the old top tab bar + action dock ===== */
.action-dock { position:fixed; left:0; right:0; bottom:0; z-index:30; padding:10px 14px calc(10px + env(safe-area-inset-bottom, 0px)); background:#ffffffef; backdrop-filter:blur(10px); border-top:2px solid var(--sea); box-shadow:0 -8px 22px rgba(11,74,110,.14); }
.action-dock.your-turn { border-top-color:rgba(99,213,129,.5); }
.action-dock-inner { width:min(1180px, 100%); margin:0 auto; display:flex; align-items:center; gap:12px; }
.dock-tabs { display:flex; flex-wrap:wrap; gap:6px; flex:1; min-width:0; }
.dock-tab { display:flex; align-items:center; gap:7px; background:transparent; border:1px solid var(--line); color:var(--text); border-radius:7px; padding:9px 12px; font-weight:650; font-size:13.5px; transition:.12s background,.12s border-color; }
.dock-tab:hover { transform:translateY(-1px); filter:brightness(1.12); }
.dock-tab:active { transform:translateY(1px); }
.dock-tab.active { border-color:rgba(224,178,90,.55); background:rgba(224,178,90,.12); color:var(--ink); }
.dock-tab-ic { color:var(--muted); font-size:15px; line-height:1; }
.dock-tab.active .dock-tab-ic { color:var(--gold); }
.dock-end-wrap { display:flex; align-items:center; gap:12px; margin-left:auto; flex:0 0 auto; }
.dock-status { color:var(--muted); font-size:13px; white-space:nowrap; }
.dock-status strong { color:var(--gold); font-size:15px; font-family:var(--font-mono); }
.dock-end { white-space:nowrap; }
.app-shell.has-dock { padding-bottom:104px; }
/* keep toasts above the dock */
.toast { z-index:36; }
.app-shell.has-dock ~ .toast { bottom:116px; }

@media (max-width: 600px) {
  .action-dock { padding:7px 8px calc(7px + env(safe-area-inset-bottom, 0px)); }
  .action-dock-inner { flex-direction:column; align-items:stretch; gap:7px; }
  .dock-tabs { display:grid; grid-template-columns:repeat(5, 1fr); gap:4px; flex:none; }
  .dock-tab { flex-direction:column; gap:2px; padding:6px 2px; font-size:10.5px; text-align:center; }
  .dock-tab-ic { font-size:16px; }
  .dock-end-wrap { justify-content:space-between; margin-left:0; }
  .dock-end { padding:11px 18px; }
  .app-shell.has-dock { padding-bottom:172px; }
  .app-shell.has-dock ~ .toast { bottom:184px; right:10px; left:10px; width:auto; }
}

/* ===== Collapsible status: resources + season trail + turn + players fold into one
   tappable bar (closed by default) so each action's content sits at the top ===== */
.status-fold { margin-bottom:12px; }
.status-toggle { width:100%; display:flex; align-items:center; gap:10px; padding:11px 14px; border-radius:var(--radius); border:1px solid var(--line); background:var(--panel); color:var(--text); box-shadow:none; }
.status-fold.open .status-toggle { border-color:rgba(224,178,90,.4); }
.status-toggle:hover { filter:brightness(1.08); }
.status-chevron { color:var(--gold); width:14px; font-size:12px; flex:0 0 auto; }
.status-toggle-label { font-weight:900; letter-spacing:.02em; white-space:nowrap; flex:0 0 auto; }
.status-summary { display:flex; flex-wrap:wrap; gap:5px 14px; margin-left:auto; justify-content:flex-end; min-width:0; }
.status-summary span { color:var(--muted); font-size:12px; font-weight:600; white-space:nowrap; font-family:var(--font-mono); letter-spacing:-.01em; }
.status-body { margin-top:12px; }
.status-body .resource-bar, .status-body .board-resource-bar { margin-top:0; }

@media (max-width: 600px) {
  .status-summary { justify-content:flex-start; gap:4px 10px; }
  .status-summary span { font-size:11.5px; }
}

/* Lean mode (default in-game): hide the explanatory paragraphs so each screen is just
   headline + action. The "ⓘ Info" toggle in the top bar reveals them. */
.app-shell.lean .screen-title p,
.app-shell.lean .section-heading > div > p { display:none; }

</style>

  function makeRng(seed) {
    let s = seed % 2147483647;
    if (s <= 0) s += 2147483646;
    return function () { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };
  }

  // Apply a chosen character's starting conditions to a player.
  function applyCharacter(player, id) {
    const ch = character(id);

    player.score = ch.startScore;
    player.res = { travel: 0, dining: 0, everyday: 0, flexible: ch.startFlexible };
    player.peak = { travel: 0, flexible: ch.startFlexible };
    player.paycheck = ch.paycheck;
    player.expenseMult = ch.expenseMult;
    if (ch.skill.startCardId && !player.wallet.some((a) => a.id === ch.skill.startCardId)) player.wallet.push(makeAccount(ch.skill.startCardId, 1));
  }
  // A player's Life Points for an item, after their character's multiplier.
  function lpValue(player, item) {
    const ch = character(player.characterId);
    let m = 1;
    if (ch) {
      if (ch.lpAllMult) m *= ch.lpAllMult;
      if (ch.lpBonusTags && item.tags.some((t) => ch.lpBonusTags.includes(t))) m *= ch.lpMult;

    return Math.round(item.lp * m);

  function characterCostDiscount(player, item) {
