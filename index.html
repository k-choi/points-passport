    for (const [key, value] of Object.entries(reward || {})) {
      if (key === "cash") { player.cash += value; continue; }
      player.res[key] = (player.res[key] || 0) + value;
      if (player.peak[key] !== undefined) player.peak[key] = Math.max(player.peak[key], player.res[key]);
    }
  }
  function setScore(player, delta) { player.score = clamp(player.score + delta, 500, 850); }

  // ----- Board ------------------------------------------------------------
  function deckFor(band) { return experiences.filter((e) => e.band === band).map((e) => e.id); }
  function refillBoard(board, decks) {
    const nextBoard = {};
    const nextDecks = {};
    for (const band of Object.keys(BOARD_ROWS)) {
      nextBoard[band] = [...(board[band] || [])].filter(Boolean);
      nextDecks[band] = [...(decks[band] || [])];
      while (nextBoard[band].length < BOARD_ROWS[band] && nextDecks[band].length) {
        nextBoard[band].push(nextDecks[band].shift());
      }
    }
    return { board: nextBoard, decks: nextDecks };
  }
  function boardExps() { return Object.values(state.board).flat().map(exp).filter(Boolean); }
  function removeFromBoard(id) { for (const band of Object.keys(state.board)) state.board[band] = state.board[band].filter((x) => x !== id); }

  // ----- Earning / cost / transfer math ----------------------------------
  function earnFor(c, catId) { return { ...((c && c.earns && c.earns[catId]) || {}) }; }
  function cardFee(c) {
    let fee = c.fee || 0;
    const ev = currentEvent();
    if (ev.premiumFeeBump && fee >= 250) fee += ev.premiumFeeBump;
    return fee;
  }
  function bestCardForCategory(player, catId) {
    let best = openAccts(player)[0];
    let bestScore = -Infinity;
    for (const entry of openAccts(player)) {
      const reward = earnFor(entry.card, catId);
      const pts = Object.entries(reward).reduce((sum, [, mult]) => sum + mult, 0);
      const score = pts + (!entry.account.bonusEarned ? 0.4 : 0);
      if (score > bestScore) { best = entry; bestScore = score; }
    }
    return best ? best.account.id : "";
  }
  function autoAssignments(player) {
    const out = {};
    for (const cat of spendCategories) out[cat.id] = bestCardForCategory(player, cat.id);
    return out;
  }

  function adjustCost(e, cost, player) {
    const ev = currentEvent();
    const out = { ...cost };
    const amt = ev.discountAmount || 0;
    if (amt && ev.discountResource && out[ev.discountResource]) {
      if (!ev.discountTag || e.tags.includes(ev.discountTag)) out[ev.discountResource] = Math.max(0, out[ev.discountResource] - amt);
    }
    const personalDiscount = player ? characterCostDiscount(player, e) : 0;
    if (personalDiscount) {
      for (const key of POINTS) {
        if (out[key]) out[key] = Math.max(0, out[key] - personalDiscount);
      }
    }
    return Object.fromEntries(Object.entries(out).filter(([, v]) => v > 0));
  }
  function affordableCost(player, e) {
    return (e.costs || []).map((c) => adjustCost(e, c, player)).find((cost) => Object.entries(cost).every(([k, v]) => (player.res[k] || 0) >= v)) || null;
  }
  function cheapestCost(e, player) { return (e.costs || []).map((c) => adjustCost(e, c, player))[0] || {}; }
  function transferMultiplier(target) { return currentEvent().bonus && currentEvent().bonus[target] ? currentEvent().bonus[target] : 1; }
  function transferOutput(amount, target) { return Math.floor(amount * transferMultiplier(target)); }

  // ----- Bucket list goal fulfilment --------------------------------------
  function goalOptionText(opt) {
    if (opt.cardBonus) { const c = card(opt.cardBonus); return `${c ? c.name : opt.cardBonus} signon bonus`; }
    if (opt.cash) return `${fmtCash(opt.cash)} cash`;
    return costOptionText(opt);
  }
  function goalOptionTextForPlayer(player, goal, opt) {
    if (opt.cardBonus || opt.cash) return goalOptionText(opt);
    return costOptionText(adjustCost(goal, opt, player));
  }
  function goalCostText(goal) { return goal.costs.map(goalOptionText).join("  or  "); }
  function optionAffordable(player, opt, goal) {
    if (opt.cardBonus) { return player.wallet.some((a) => a.id === opt.cardBonus && a.status !== "closed" && a.bonusEarned && !a.bonusSpent); }
    if (opt.cash) return player.cash >= opt.cash;
    const priced = adjustCost(goal, opt, player);
    return Object.entries(priced).every(([k, v]) => (player.res[k] || 0) >= v);
  }
  // Auto-pick the best affordable payment: a signon bonus is "free", otherwise points. Never cash.
  function chooseGoalPayment(player, goal) {
    const byKind = (test) => goal.costs.find((o) => test(o) && optionAffordable(player, o, goal));
    return byKind((o) => o.cardBonus) || byKind((o) => !o.cardBonus) || null;
  }
  function goalAffordable(player, goal) { return !!chooseGoalPayment(player, goal); }

  // ----- Credit card offer deck & market ----------------------------------
  const CARD_MARKET_SIZE = 3;
  function shuffle(arr, rnd) {
    const a = arr.slice();
    const r = rnd || Math.random;
    for (let i = a.length - 1; i > 0; i -= 1) { const j = Math.floor(r() * (i + 1)); const t = a[i]; a[i] = a[j]; a[j] = t; }
    return a;
  }
  function freshCardDeck(rnd) {
    const ids = [];
    for (const c of cards) { ids.push(c.id, c.id, c.id); } // three offers of each card in the deck
    return shuffle(ids, rnd);
  }
  // Refill the face-up market from the deck, preferring cards not already shown.
  function fillMarket(market, deck) {
    const m = market.slice();
    const d = deck.slice();
    while (m.length < CARD_MARKET_SIZE && d.length) {
      let idx = d.findIndex((id) => !m.includes(id));
      if (idx < 0) idx = 0;
      m.push(d.splice(idx, 1)[0]);
    }
    return { market: m, deck: d };
  }
  // Take a card from the shared market and reveal the next offer from the deck.
  function takeFromMarket(cardId) {
    const i = state.cardMarket.indexOf(cardId);
    if (i < 0) return false;
    state.cardMarket.splice(i, 1);
    const f = fillMarket(state.cardMarket, state.cardDeck);
    state.cardMarket = f.market;
    state.cardDeck = f.deck;
    return true;
  }

  // ----- Scoring ----------------------------------------------------------
  function milestonesFor(player) { return personalBoardById(player.personalBoardId).milestones.map((m) => ({ ...m, complete: m.done(player) })); }
  // During play, unfulfilled goals don't subtract yet (no scary negative LP on turn 1).
  // The disappointment penalty only applies at final scoring (final = true).
  function scorePlayer(player, final) {
    const experienceScore = claimedExps(player).reduce((sum, e) => sum + lpValue(player, e), 0);
    const ticketScore = player.ticketIds.reduce((sum, id) => {
      const t = ticket(id); if (!t) return sum;
      if (player.goalsDone.includes(id)) return sum + lpValue(player, t);
      return sum + (final ? -t.penalty : 0);
    }, 0);
    const personalScore = milestonesFor(player).reduce((sum, m) => sum + (m.complete ? m.lp : 0), 0);
    const pending = final ? 0 : player.ticketIds.filter((id) => !player.goalsDone.includes(id)).reduce((sum, id) => sum + (ticket(id) ? ticket(id).penalty : 0), 0);
    return { total: experienceScore + ticketScore + personalScore, experiences: experienceScore, tickets: ticketScore, personal: personalScore, pendingRisk: pending };
  }

  const lpCategories = [
    { key: "luxe", label: "First Class & Luxury", tags: ["Flight", "Luxury"] },
    { key: "stays", label: "Stays & Adventures", tags: ["Hotel", "Adventure"] },
    { key: "dining", label: "Dining & Culture", tags: ["Food", "Culture"] },
    { key: "city", label: "City & Style", tags: ["City", "Shopping"] }
  ];
  function lpBreakdown(player) {
    const out = { luxe: 0, stays: 0, dining: 0, city: 0 };
    for (const e of claimedExps(player)) {
      const bucket = lpCategories.find((cat) => cat.tags.some((t) => e.tags.includes(t)));
      out[bucket ? bucket.key : "city"] += lpValue(player, e);
    }
    return out;
  }
  function pressureTag(player) {
    if (player.debt > 0) return "In Debt";
    if (boardExps().some((e) => affordableCost(player, e))) return "Can Claim";
    if (player.res.flexible >= 20000) return "Transfer Ready";
    const close = openAccts(player).some(({ account, card: c }) => !account.bonusEarned && c.bonus && account.spendProgress >= c.bonus.needSpend * 0.6);
    if (close) return "Bonus Close";
    if (player.score < 670) return "Score Risk";
    return "Building";
  }

  // ----- Visible opponent intent (table tension) --------------------------
  function fmtK(n) { return Math.round(n / 1000) + "k"; }
  function interestTags(p) {
    if (p.strategyId) return strategy(p.strategyId).tags;
    const ch = character(p.characterId);
    return ch && ch.lpBonusTags ? ch.lpBonusTags : [];
  }
  // For a target (experience or goal), find the cheapest payable option and the
  // single biggest remaining currency gap toward it.
  function targetGap(player, target) {
    let best = { shortfall: Infinity, top: null, affordable: false };
    for (const opt of target.costs) {
      if (opt.cardBonus) {
        const ok = player.wallet.some((a) => a.id === opt.cardBonus && a.status !== "closed" && a.bonusEarned && !a.bonusSpent);
        if (ok) return { shortfall: 0, top: null, affordable: true };
        continue;
      }
      if (opt.cash) continue; // luxury isn't bought with cash
      const cost = adjustCost(target.item, opt, player);
      let total = 0, top = null;
      for (const [k, v] of Object.entries(cost)) {
        const short = Math.max(0, v - (player.res[k] || 0));
        total += short;
        if (short > 0 && (!top || short > top.amt)) top = { key: k, amt: short };
      }
      if (total < best.shortfall) best = { shortfall: total, top, affordable: total === 0 };
    }
    return best;
  }
  function playerIntent(player) {
    const targets = [];
    for (const e of boardExps()) targets.push({ name: e.name, kind: "experience", item: e, costs: e.costs, lp: e.lp, tags: e.tags });
    for (const id of player.ticketIds) if (!player.goalsDone.includes(id)) { const g = ticket(id); if (g) targets.push({ name: g.name, kind: "goal", item: g, costs: g.costs, lp: g.lp, tags: g.tags }); }
    if (!targets.length) return null;
    const tags = interestTags(player);
    const desire = (t) => t.lp + t.tags.reduce((s, tag) => s + (tags.includes(tag) ? 4 : 0), 0) + (t.kind === "goal" ? 3 : 0);
    const scored = targets.map((t) => ({ t, gap: targetGap(player, t) }));
    const affordable = scored.filter((x) => x.gap.affordable);
    if (affordable.length) {
      const pick = affordable.sort((a, b) => desire(b.t) - desire(a.t))[0];
      return { urgent: true, text: `Can ${pick.t.kind === "goal" ? "book" : "claim"} ${pick.t.name}` };
    }
    const reachable = scored.filter((x) => x.gap.top && isFinite(x.gap.shortfall));
    if (!reachable.length) return null;
    reachable.sort((a, b) => (desire(b.t) - b.gap.shortfall / 30000) - (desire(a.t) - a.gap.shortfall / 30000));
    const pick = reachable[0];
    return { urgent: false, text: `${fmtK(pick.gap.top.amt)} ${pointLabel(pick.gap.top.key)} from ${pick.t.name}` };
  }

  // ----- State ------------------------------------------------------------
  function defaultState() {
    const decks = { everyday: deckFor("everyday"), premium: deckFor("premium"), dream: deckFor("dream") };
    const filled = refillBoard({ everyday: [], premium: [], dream: [] }, decks);
    return {
      version: 15,
      screen: "setup",
      gameStarted: false,
      year: 1,
      season: 1,
      maxYears: DEFAULT_YEARS,
      players: [],
      order: [],
      turnPtr: 0,
      actionsLeft: ACTIONS_PER_TURN,
      board: filled.board,
      decks: filled.decks,
      cardDeck: [],
      cardMarket: [],
      goalDeck: [],
      eventId: events[0].id,
      playerSetup: { totalPlayers: 4, humanPlayers: 1, years: DEFAULT_YEARS },
      log: ["Welcome. Set the table, then start the game."],
      activity: [],
      passPending: false,
      setupPhase: null,
      ticketSelection: [],
      drawSelection: [],
      draftSelection: null,
      spendAssignments: {},
      transferSelection: null,
      rulesOverlay: { open: false, topic: "overview" },
      onboarding: { open: !meta.onboardingDone, step: 0 },
      achievementsOpen: false,
      statusOpen: false,
      showHelp: false,
      simulationResults: null,
      result: null
    };
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        if (parsed && parsed.version === 15) return parsed;
      }
    } catch (e) {}
    return defaultState();
  }

  var state = loadState();
  let toastTimer = null;
  let resetArmed = false, resetTimer = null;
  function save() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {} }
  function addLog(text) { state.log.unshift(text); state.log = state.log.slice(0, 80); }
  function notify(title, message) {
    if (typeof document.body.appendChild !== "function") return;
    const old = document.querySelector(".toast");
    if (old && old.remove) old.remove();
    const node = document.createElement("div");
    node.className = "toast";
    node.innerHTML = `<h4>${html(title)}</h4><p>${html(message || "")}</p>`;
    document.body.appendChild(node);
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => node.remove && node.remove(), 3400);
  }

  function activePlayer() { return state.players[state.order[state.turnPtr]]; }
  function isHumanTurn() { return state.gameStarted && !state.result && !state.setupPhase && activePlayer() && activePlayer().isHuman; }
  function canSpendAction() { return isHumanTurn() && !state.passPending && state.actionsLeft > 0; }
  function activeTicketChooser() { return state.players.find((p) => p.isHuman && !p.ticketChosen) || null; }
  function humanSeatViewing() {
    if (state.setupPhase === "characters") return activeCharacterChooser() || state.players.find((p) => p.isHuman) || state.players[0];
    if (state.setupPhase === "tickets") return activeTicketChooser() || state.players.find((p) => p.isHuman) || state.players[0];
    return activePlayer() && activePlayer().isHuman ? activePlayer() : state.players.find((p) => p.isHuman) || state.players[0];
  }

  // Ticket to Ride-style bucket list draft: deal each player 3 random goals from a
  // shuffled deck (distinct across players); the rest become the draw pile.
  function dealGoalOffers(players, rnd) {
    const deck = shuffle(bucketTickets.map((t) => t.id), rnd);
    for (const pl of players) pl.ticketOffer = deck.splice(0, 3);
    return deck; // remaining draw pile for mid-game Draw actions
  }
  function aiKeepTickets(player) {
    const profile = strategy(player.strategyId);
    const matches = player.ticketOffer.filter((id) => { const g = ticket(id); return g && g.tags.some((t) => profile.tags.includes(t)); });
    let keep = matches.length ? matches.slice(0, 2) : [player.ticketOffer[0]];
    if (profile.risk > 0.7) { const extra = player.ticketOffer.find((id) => !keep.includes(id)); if (extra) keep = keep.concat(extra); }
    return keep;
  }
  // Mid-game: peek the top 2 of the shuffled draw pile that the player doesn't already hold.
  function drawGoalOffer(player) {
    return (state.goalDeck || []).filter((id) => !player.ticketIds.includes(id)).slice(0, 2);
  }

  // ----- Turn engine ------------------------------------------------------
  function startGame() {
    const total = clamp(Number(state.playerSetup.totalPlayers) || 4, 2, 5);
    const humans = clamp(Number(state.playerSetup.humanPlayers) || 1, 1, total);
    const years = clamp(Number(state.playerSetup.years) || DEFAULT_YEARS, 2, 3);
    const fresh = defaultState();
    fresh.gameStarted = true;
    fresh.screen = "board";
    fresh.maxYears = years;
    fresh.playerSetup = { totalPlayers: total, humanPlayers: humans, years };
    const players = [];
    const humanArchetypes = ["luxury", "culture", "efficient", "luxury", "culture"];
    for (let i = 0; i < humans; i += 1) players.push(makePlayer(i, true, humanArchetypes[i]));
    for (let i = humans; i < total; i += 1) players.push(makePlayer(i, false, strategyProfiles[(i - humans) % strategyProfiles.length].id));
    fresh.goalDeck = dealGoalOffers(players);
    for (const pl of players) {
      if (pl.isHuman) { pl.ticketIds = []; pl.ticketChosen = false; }
      else { applyCharacter(pl, strategy(pl.strategyId).characterId); pl.ticketIds = aiKeepTickets(pl); pl.ticketChosen = true; }
    }
    fresh.players = players;
    fresh.order = players.map((_, i) => i);
    fresh.turnPtr = 0;
    const dealt = fillMarket([], freshCardDeck());
    fresh.cardMarket = dealt.market;
    fresh.cardDeck = dealt.deck;
    fresh.log = [`Game on: ${total} players (${humans} human, ${total - humans} AI). Pick your character.`, `Event: ${currentEventFor(fresh).text}`];
    state = fresh;
    if (activeCharacterChooser()) { state.setupPhase = "characters"; state.screen = "characters"; }
    else if (activeTicketChooser()) { state.setupPhase = "tickets"; state.screen = "tickets"; state.ticketSelection = []; }
    else { runUntilHuman(); }
    save();
    render();
  }

  function activeCharacterChooser() { return state.players.find((p) => p.isHuman && !p.characterId) || null; }
  function pickCharacter(id) {
    const chooser = activeCharacterChooser();
    if (!chooser || !character(id)) return;
    applyCharacter(chooser, id);
    if (chooser.isHuman) unlockAchievement("first-steps");
    if (activeCharacterChooser()) { /* next human picks (public choice, no pass needed) */ }
    else if (activeTicketChooser()) { state.setupPhase = "tickets"; state.screen = "tickets"; state.ticketSelection = []; if (state.playerSetup.humanPlayers > 1) state.passPending = true; }
    else { state.setupPhase = null; state.screen = "board"; runUntilHuman(); }
    save();
    render();
  }

  function confirmTickets() {
    const chooser = activeTicketChooser();
    if (!chooser) return;
    const keep = state.ticketSelection.filter((id) => chooser.ticketOffer.includes(id));
    if (keep.length < 1) { notify("Keep at least one", "Pick at least 1 bucket list goal to chase."); return; }
    chooser.ticketIds = keep;
    chooser.ticketChosen = true;
    state.ticketSelection = [];
    const next = activeTicketChooser();
    if (next) { if (state.playerSetup.humanPlayers > 1) state.passPending = true; }
    else { state.setupPhase = null; state.screen = "board"; runUntilHuman(); }
    save();
    render();
  }
  function toggleTicketKeep(id) {
    const sel = state.ticketSelection || [];
    state.ticketSelection = sel.includes(id) ? sel.filter((x) => x !== id) : [...sel, id];
    save(); render();
  }
  function toggleDrawGoal(id) {
    const offer = drawGoalOffer(humanSeatViewing());
    if (!offer.includes(id)) return;
    const sel = state.drawSelection || [];
    state.drawSelection = sel.includes(id) ? sel.filter((x) => x !== id) : [...sel, id];
    save(); render();
  }
  function currentEventFor(st) { return events.find((e) => e.id === st.eventId) || events[0]; }

  // Resolve one action for a player. Mutates player + shared board. No UI side effects.
  function resolveAction(player, action) {
    const profile = player.isHuman ? null : strategy(player.strategyId);
    if (action.type === "apply") {
      const c = card(action.cardId);
      if (!c || !state.cardMarket.includes(c.id)) return; // must be a face-up offer
      takeFromMarket(c.id); // reveal the next offer from the deck
      player.wallet.push(makeAccount(c.id, player.year));
      const ch = character(player.characterId);
      const scoreCost = ch && ch.skill.applyScoreCost != null ? ch.skill.applyScoreCost : 15;
      setScore(player, -scoreCost);
      player.lastAction = `Applied for ${c.name} (−${scoreCost} score)`;
      logActor(player, `${player.name} applied for ${c.name}.`);
    } else if (action.type === "purchase") {
      const assignments = action.assignments || autoAssignments(player);
      const ev = currentEvent();
      const ch = character(player.characterId);
      const pay = player.paycheck || PAYCHECK;
      const em = player.expenseMult || 1;
      const bonusMult = ch && ch.skill.bonusMult ? ch.skill.bonusMult : 1;
      player.cash += pay; // your paycheck
      for (const cat of spendCategories) {
        const amount = Math.round(cat.amount * em);
        player.cash -= amount; // the fixed expense is paid from your paycheck
        const acc = player.wallet.find((a) => a.id === assignments[cat.id] && a.status !== "closed") || openAccts(player)[0]?.account;
        if (!acc) continue;
        const c = card(acc.id);
        const reward = earnFor(c, cat.id);
        for (const [k, mult] of Object.entries(reward)) addRes(player, { [k]: amount * mult });
        if (c.cashback) addRes(player, { cash: c.cashback });
        acc.spendProgress += amount;
        if (!acc.bonusEarned && c.bonus && acc.spendProgress >= c.bonus.needSpend) {
          acc.bonusEarned = true;
          const reward2 = {}; for (const [k, v] of Object.entries(c.bonus.reward)) reward2[k] = Math.round(v * bonusMult);
          addRes(player, reward2);
          logActor(player, `${player.name}: ${c.name} welcome bonus → ${rewardText(reward2)}.`);
        }
      }
      if (ev.earnBoost) addRes(player, ev.earnBoost);
      player.paidThisSeason = true;
      if (player.debt > 0) { const pay2 = Math.min(player.cash, player.debt); player.cash -= pay2; player.debt -= pay2; } // pay down the carried balance
      player.lastAction = "Cashed a paycheck and paid the bills";
      logActor(player, `${player.name} cashed a ${fmtCash(pay)} paycheck and paid this season's bills.`);
    } else if (action.type === "transfer") {
      const amount = action.amount;
      if (player.res.flexible < amount) return;
      const out = playerTransferOutput(player, amount, action.target);
      player.res.flexible -= amount;
      addRes(player, { [action.target]: out });
      player.transfers += 1;
      player.lastAction = `Transferred ${fmtPts(amount)} Flexible → ${fmtPts(out)} ${pointLabel(action.target)}`;
      logActor(player, `${player.name} transferred ${fmtPts(amount)} Flexible into ${fmtPts(out)} ${pointLabel(action.target)}.`);
    } else if (action.type === "experience") {
      const e = exp(action.expId);
      const cost = e && affordableCost(player, e);
      if (!e || !cost) return;
      for (const [k, v] of Object.entries(cost)) player.res[k] -= v;
      if (cost.flexible) player.flexClaims += 1;
      player.claimed.push(e.id);
      removeFromBoard(e.id);
      const filled = refillBoard(state.board, state.decks);
      state.board = filled.board; state.decks = filled.decks;
      const ch2 = character(player.characterId);
      if (ch2 && ch2.skill.claimRefund && e.band === "dream") addRes(player, { flexible: ch2.skill.claimRefund });
      player.lastAction = `Claimed ${e.name} (+${lpValue(player, e)} LP)`;
      logActor(player, `${player.name} claimed ${e.name} for ${lpValue(player, e)} LP.`);
    } else if (action.type === "fulfill") {
      const goal = ticket(action.goalId);
      if (!goal || !player.ticketIds.includes(goal.id) || player.goalsDone.includes(goal.id)) return;
      const opt = chooseGoalPayment(player, goal);
      if (!opt) return;
      if (opt.cardBonus) { const acc = player.wallet.find((a) => a.id === opt.cardBonus && a.status !== "closed"); if (acc) acc.bonusSpent = true; }
      else if (opt.cash) { player.cash -= opt.cash; }
      else {
        const priced = adjustCost(goal, opt, player);
        for (const [k, v] of Object.entries(priced)) player.res[k] -= v;
        if (priced.flexible) player.flexClaims += 1;
      }
      player.goalsDone.push(goal.id);
      player.lastAction = `Fulfilled "${goal.name}" (+${goal.lp} LP)`;
      logActor(player, `${player.name} fulfilled a bucket list goal: ${goal.name} (+${goal.lp} LP).`);
    } else if (action.type === "account") {
      doAccount(player, action.cardId, action.op);
    } else if (action.type === "drawgoals") {
      const keep = (action.keep || []).filter((id) => ticket(id) && !player.ticketIds.includes(id));
      if (!keep.length) return;
      player.ticketIds.push(...keep);
      state.goalDeck = (state.goalDeck || []).filter((id) => !keep.includes(id));
      player.lastAction = `Drew ${keep.length} new luxury life experience${keep.length === 1 ? "" : "s"}`;
      logActor(player, `${player.name} drew ${keep.length} new bucket list goal${keep.length === 1 ? "" : "s"}.`);
    }
  }

  function rewardText(reward) { return Object.entries(reward || {}).map(([k, v]) => `+${amountText(k, v)}`).join(", "); }

  function logActor(player, text) {
    addLog(text);
    if (!player.isHuman) state.activity.push(text);
  }

  function doAccount(player, cardId, op) {
    const acc = player.wallet.find((a) => a.id === cardId);
    const c = card(cardId);
    if (!acc || !c || acc.status === "closed") return;
    if (op === "downgrade") {
      acc.status = "downgraded";
      player.accountMoves += 1;
      player.lastAction = `Downgraded ${c.name}`;
      logActor(player, `${player.name} downgraded ${c.name} (keeps age, no fee).`);
    } else if (op === "close") {
      if (openAccts(player).length <= 1) return;
      acc.status = "closed";
      const hit = acc.age <= 1 ? 25 : 10;
      setScore(player, -hit);
      player.accountMoves += 1;
      player.lastAction = `Closed ${c.name} (−${hit} score)`;
      logActor(player, `${player.name} closed ${c.name} (−${hit} Credit Score).`);
    } else {
      acc.status = "open";
      player.lastAction = `Kept ${c.name}`;
      logActor(player, `${player.name} kept ${c.name}.`);
    }
  }

  function advancePointer() {
    state.turnPtr += 1;
    if (state.turnPtr >= state.order.length) {
      seasonUpkeep(); // close out the season that just ended
      state.turnPtr = 0;
      state.season += 1;
      if (state.season > SEASONS_PER_YEAR) endYear();
    }
  }

  // End-of-season credit cycle: unpaid bills carry, the balance accrues rounded interest.
  function seasonUpkeep() {
    for (const player of state.players) {
      const ch = character(player.characterId);
      if (ch && ch.skill.noApr) { player.paidThisSeason = false; continue; } // Fee Hacker never owes interest
      if (!player.paidThisSeason) player.debt += MISSED_BILL; // skipped this month's statement
      if (player.debt > 0) {
        const interest = roundTo(player.debt * APR_SEASON, APR_ROUND); // seasonal interest, rounded
        player.debt += interest;
        setScore(player, -DEBT_SCORE_HIT);
        logActor(player, `${player.name} carried a balance — ${fmtCash(interest)} interest, now owing ${fmtCash(player.debt)}.`);
      }
      player.paidThisSeason = false;
    }
  }

  function endYear() {
    // Annual upkeep for every player: pay fees, age accounts.
    for (const player of state.players) {
      const ch = character(player.characterId);
      let feeTotal = 0;
      for (const { account, card: c } of openAccts(player)) {
        if (account.status === "downgraded") continue;
        feeTotal += cardFee(c);
      }
      if (ch && ch.skill.feeMult) feeTotal = Math.round(feeTotal * ch.skill.feeMult);
      player.cash -= feeTotal;
      player.feesPaid += feeTotal;
      if (player.year === 1) player.yearOneFees = feeTotal;
      if (player.cash < 0) { setScore(player, -30); player.cash = 0; }
      for (const a of player.wallet) if (a.status !== "closed") a.age += 1;
      if (!player.isHuman) aiAccountUpkeep(player);
    }
    if (state.year >= state.maxYears) { finishGame(); return; }
    state.season = 1;
    state.year += 1;
    for (const player of state.players) player.year = state.year;
    state.eventId = events[(state.year - 1) % events.length].id;
    addLog(`— Year ${state.year} begins. Event: ${currentEvent().name}. —`);
    state.activity.push(`Year ${state.year} begins. Event: ${currentEvent().name}.`);
  }

  function aiAccountUpkeep(player) {
    const profile = strategy(player.strategyId);
    for (const account of player.wallet) {
      const c = card(account.id);
      if (!c || account.status !== "open") continue;
      if (cardFee(c) > profile.feeTolerance && account.bonusEarned) {
        account.status = account.age <= 1 && profile.risk < 0.5 ? "closed" : "downgraded";
        player.accountMoves += 1;
        if (account.status === "closed") setScore(player, account.age <= 1 ? -25 : -10);
      }
    }
  }

  function finishGame() {
    state.year = state.maxYears;
    for (const player of state.players) player.year = state.maxYears + 1;
    const ranked = state.players.map((p) => ({ player: p, score: scorePlayer(p, true) })).sort((a, b) => b.score.total - a.score.total || b.player.claimed.length - a.player.claimed.length);
    state.result = { ranked, winnerSeat: ranked[0].player.seat };
    state.gameStarted = false;
    state.screen = "results";
    addLog(`Final scoring complete. ${ranked[0].player.name} wins with ${ranked[0].score.total} LP.`);
    awardEndgameAchievements(ranked);
  }

  // Cross-play achievements + advanced-cast unlock, evaluated at final scoring.
  function awardEndgameAchievements(ranked) {
    meta.gamesCleared = (meta.gamesCleared || 0) + 1;
    unlockAchievement("first-clear");
    if (!meta.advancedUnlocked) { meta.advancedUnlocked = true; unlockAchievement("advanced-unlocked"); }
    const human = state.players.find((p) => p.isHuman);
    if (human) {
      const humanRank = ranked.findIndex((r) => r.player.isHuman);
      const sc = scorePlayer(human, true);
      if (humanRank === 0) {
        unlockAchievement("first-win");
        const c = character(human.characterId);
        if (c && !c.starter) unlockAchievement("win-" + c.id);
      }
      if (human.ticketIds.length && human.ticketIds.every((id) => human.goalsDone.includes(id))) unlockAchievement("all-goals");
      if (humanIsAdvanced()) {
        if (sc.total >= 60) unlockAchievement("high-flyer");
        if (claimedExps(human).length >= 8) unlockAchievement("collector-pro");
      }
    }
    saveMeta();
  }

  // Drive AI turns (a full season of actions each) until it's a human's turn or the game ends.
  function runUntilHuman() {
    let guard = 0;
    while (state.gameStarted && !state.result && guard < 5000) {
      guard += 1;
      const p = activePlayer();
      if (!p) break;
      if (p.isHuman) { state.actionsLeft = ACTIONS_PER_TURN; break; }
      for (let i = 0; i < ACTIONS_PER_TURN && state.gameStarted && !state.result; i += 1) resolveAction(p, aiChooseAction(p));
      advancePointer();
    }
  }

  // End the active human's turn: hand off to AI, then stop at the next human.
  function endHumanTurn() {
    state.activity = [];
    advancePointer();
    if (!state.result) runUntilHuman();
    if (isHumanTurn() && state.playerSetup.humanPlayers > 1) state.passPending = true;
    if (isHumanTurn() && !state.passPending) notify(`Your turn — Year ${state.year}, Season ${state.season}`, `You have ${ACTIONS_PER_TURN} actions. Rivals just played their turns.`);
  }

  // After a human commits one action. They keep acting until actions run out or they end the turn.
  function humanAct(action) {
    if (!canSpendAction()) return;
    resolveAction(activePlayer(), action);
    checkLiveAchievements();
    state.draftSelection = null;
    state.transferSelection = null;
    state.drawSelection = [];
    state.actionsLeft = Math.max(0, state.actionsLeft - 1);
    // The turn does NOT auto-end. The player ends it explicitly with "End my turn".
    if (!state.result && state.screen !== "results") state.screen = "board";
    save();
    render();
  }

  function endTurnNow() {
    if (!isHumanTurn() || state.passPending) return;
    endHumanTurn();
    if (!state.result) state.screen = "board";
    save();
    render();
  }

  // ----- AI brain (shared rules; just chooses an action) ------------------
  function expValue(player, e, cost) {
    const profile = strategy(player.strategyId);
    const tagScore = e.tags.reduce((sum, tag) => sum + (profile.tags.includes(tag) ? 5 : 0), 0);
    const targetScore = Object.keys(cost || {}).some((k) => k === profile.target) ? 3 : 0;
    const dream = e.band === "dream" ? profile.risk * 5 : 0;
    return e.lp * 2 + tagScore + targetScore + dream;
  }
  function cardValue(player, c) {
    const profile = strategy(player.strategyId);
    let score = profile.preferredCards.includes(c.id) ? 18 : 0;
    if (c.focus === profile.target) score += 6;
    score += Object.values(c.bonus ? c.bonus.reward : {}).reduce((s, n) => s + (n > 1000 ? n / 12000 : n), 0);
    score += Object.values(c.earns || {}).flatMap((r) => Object.entries(r)).reduce((s, [k, v]) => s + (k === profile.target || k === "flexible" ? v * 2 : v), 0);
    if (c.fee > profile.feeTolerance) score -= (c.fee - profile.feeTolerance) / 80;
    if (c.scoreRequired && player.score < c.scoreRequired) score -= 100;
    return score;
  }
  function aiChooseAction(player) {
    // Fulfilling a kept goal is guaranteed LP and avoids the disappointment penalty — prioritise it.
    const goal = player.ticketIds.filter((id) => !player.goalsDone.includes(id)).map((id) => ticket(id)).filter((g) => g && goalAffordable(player, g)).sort((a, b) => b.lp - a.lp)[0];
    if (goal) return { type: "fulfill", goalId: goal.id };
    const claimable = boardExps().map((e) => ({ e, cost: affordableCost(player, e) })).filter((x) => x.cost);
    const bestClaim = claimable.sort((a, b) => expValue(player, b.e, b.cost) - expValue(player, a.e, a.cost))[0];
    if (bestClaim && (player.year === state.maxYears || expValue(player, bestClaim.e, bestClaim.cost) >= 14)) return { type: "experience", expId: bestClaim.e.id };
    const profile = strategy(player.strategyId);
    if (player.res.flexible >= 40000 && (transferMultiplier(profile.target) > 1 || player.res[profile.target] < 30000)) return { type: "transfer", target: profile.target, amount: player.res.flexible >= 60000 ? 40000 : 20000 };
    if (player.year <= 2 && openAccts(player).length < 4) {
      const owned = new Set(player.wallet.map((a) => a.id));
      const pick = state.cardMarket.map(card).filter(Boolean)
        .filter((c) => !owned.has(c.id) && (!c.scoreRequired || player.score >= c.scoreRequired))
        .sort((a, b) => cardValue(player, b) - cardValue(player, a))[0];
      if (pick && cardValue(player, pick) > 10) return { type: "apply", cardId: pick.id };
    }
    if (bestClaim) return { type: "experience", expId: bestClaim.e.id };
    return { type: "purchase" };
  }

  // ----- Headless simulation (reuses the same engine) ---------------------
  function simulateGame(archetypeIds, seed) {
    const saved = state;
    const rng = makeRng(seed);
    const decks = { everyday: deckFor("everyday").sort(() => rng() - 0.5), premium: deckFor("premium").sort(() => rng() - 0.5), dream: deckFor("dream").sort(() => rng() - 0.5) };
    const filled = refillBoard({ everyday: [], premium: [], dream: [] }, decks);
    const sim = defaultState();
    sim.gameStarted = true;
    sim.board = filled.board; sim.decks = filled.decks;
    sim.players = archetypeIds.map((id, i) => makePlayer(i, false, id));
    sim.goalDeck = dealGoalOffers(sim.players, rng);
    for (const p of sim.players) { applyCharacter(p, strategy(p.strategyId).characterId); p.ticketIds = aiKeepTickets(p); p.ticketChosen = true; }
    const dealt = fillMarket([], freshCardDeck(rng));
    sim.cardMarket = dealt.market; sim.cardDeck = dealt.deck;
    sim.order = sim.players.map((_, i) => i);
    state = sim;
    runUntilHuman();
    const ranked = state.result ? state.result.ranked : state.players.map((p) => ({ player: p, score: scorePlayer(p, true) }));
    const top = Math.max(...ranked.map((r) => r.score.total));
    const out = ranked.map((r) => ({ strategyId: r.player.strategyId, total: r.score.total, won: r.score.total === top }));
    state = saved;
    return out;
  }
  function runBalance(iterations, total) {
    const ids = strategyProfiles.map((p) => p.id);
    const stats = Object.fromEntries(strategyProfiles.map((p) => [p.id, { profile: p, games: 0, wins: 0, totalScore: 0, high: 0 }]));
    for (let i = 0; i < iterations; i += 1) {
      const lineup = Array.from({ length: total }, (_, k) => ids[(i + k) % ids.length]);
      for (const r of simulateGame(lineup, 1009 + i * 91 + total)) {
        const row = stats[r.strategyId];
        row.games += 1; row.wins += r.won ? 1 : 0; row.totalScore += r.total; row.high = Math.max(row.high, r.total);
      }
    }
    return Object.values(stats).map((row) => ({ ...row, winRate: row.games ? row.wins / row.games : 0, avgScore: row.games ? row.totalScore / row.games : 0 })).sort((a, b) => b.winRate - a.winRate);
  }

  // ----- UI commands ------------------------------------------------------
  function setScreen(screen) { state.screen = screen; save(); render(); }
  function setPlayerSetup(key, value) {
    state.playerSetup[key] = Number(value);
    if (key === "totalPlayers" && state.playerSetup.humanPlayers > state.playerSetup.totalPlayers) state.playerSetup.humanPlayers = state.playerSetup.totalPlayers;
    save(); render();
  }
  function openRules(topic) { state.rulesOverlay = { open: true, topic: topic || "story" }; save(); render(); }
  function closeRules() { state.rulesOverlay = { ...(state.rulesOverlay || {}), open: false }; save(); render(); }
  // Two-tap confirm ONLY mid-game (native confirm() is blocked in sandboxed iframes → reset
  // would silently no-op). On the setup screen or after a game is over, reset immediately.
  function resetGame() {
    const midGame = state.gameStarted && !state.result;
    if (midGame && !resetArmed) {
      resetArmed = true;
      notify("Start fresh?", "Tap Reset again to wipe this game and start over.");
      clearTimeout(resetTimer);
      resetTimer = setTimeout(() => { resetArmed = false; }, 4000);
      return;
    }
    clearTimeout(resetTimer);
    resetArmed = false;
    state = defaultState();
    save();
    render();
  }
  function continuePass() { state.passPending = false; save(); render(); }

  function selectDraft(cardId) {
    const p = humanSeatViewing();
    if (!state.cardMarket.includes(cardId) || p.wallet.some((a) => a.id === cardId && a.status !== "closed")) return;
    state.draftSelection = state.draftSelection === cardId ? null : cardId;
    save(); render();
  }
  function selectTransfer(target, amount) {
    const cur = state.transferSelection;
    state.transferSelection = cur && cur.target === target && cur.amount === amount ? null : { target, amount };
    save(); render();
  }
  function setAssignment(catId, cardId) { state.spendAssignments[catId] = cardId; save(); render(); }
  function runSimulation() {
    const total = Number(state.playerSetup.totalPlayers) || 4;
    state.simulationResults = { iterations: 120, total, rows: runBalance(120, total) };
    save(); render();
  }

  // ----- Rendering --------------------------------------------------------
  function render() {
    try {
      const showBoard = state.gameStarted && !state.setupPhase;
      if (app.classList) { app.classList.toggle("has-dock", showBoard); app.classList.toggle("lean", showBoard && !state.showHelp); }
      app.innerHTML = `
        ${renderTopbar()}
        ${showBoard ? renderStatusFold() : ""}
        <main class="content content-below">${renderScreen()}</main>
        ${showBoard ? renderActionDock() : ""}
        ${state.passPending ? renderPassOverlay() : ""}
        ${state.rulesOverlay && state.rulesOverlay.open ? renderRulesOverlay() : ""}
        ${state.achievementsOpen ? renderAchievementsOverlay() : ""}
        ${state.onboarding && state.onboarding.open ? renderOnboardingOverlay() : ""}
      `;
    } catch (err) {
      app.innerHTML = `
        <div class="card-panel paper" style="margin:20px auto;max-width:560px">
          <h1>Something went wrong</h1>
          <p>The game hit an unexpected error. Starting a fresh game usually fixes it.</p>
          <pre style="white-space:pre-wrap;color:#a33;font-size:12px">${html(String(err && err.message || err))}</pre>
          <button class="danger-button" data-action="reset">Reset game</button>
        </div>`;
      try { console.error(err); } catch (e) {}
    }
  }

  function renderStatusFold() {
    const open = !!state.statusOpen;
    const p = humanSeatViewing();
    const youTurn = isHumanTurn();
    const bits = p
      ? [youTurn ? "Your turn" : "Rivals playing", `Yr ${state.year}/${state.maxYears} · S${state.season}`, fmtCash(p.cash), `${fmtPts(p.res.flexible)} flex`, `${p.score} credit`]

  }

  function renderResourceBar() {
    const p = humanSeatViewing();
    if (!p) return "";
    const tiles = [
      ["travel", p.res.travel], ["dining", p.res.dining], ["everyday", p.res.everyday], ["flexible", p.res.flexible], ["cash", p.cash], ["score", p.score]
    ];
    return `
      <section class="resource-bar board-resource-bar">
        ${tiles.map(([key, value]) => {
          const icon = key === "cash" ? "$" : key === "score" ? "🛡" : pointMeta[key].icon;
          const risk = key === "score" && value < 670;
          const sub = key === "score" ? `<div class="res-sub">${scoreBand(value)}</div>` : "";
          return `
          <div class="resource mini-resource has-tooltip ${risk ? "resource-risk" : ""}" data-tooltip="${html(resourceHelp[key])}" tabindex="0">
            <div class="emoji">${icon}</div>
            <div>
              <div class="label">${pointLabel(key)}</div>
              <div class="value">${valueText(key, value)}</div>
              ${sub}
            </div>
          </div>`;
        }).join("")}
      </section>`;
  }

  function renderNav() {
    const nav = [
      ["setup", "▶", "Start"], ["board", "▦", "Board"], ["players", "♟", "Players"], ["goals", "◎", "Goals"], ["draft", "▣", "Apply"], ["spend", "◫", "Purchase"],
      ["transfer", "⇄", "Transfer"], ["accounts", "≡", "Accounts"], ["passport", "★", "Passport"], ["simulation", "％", "Sim"], ["results", "✓", "Score"]
    ];
    const p = humanSeatViewing();
    return `
      <aside class="nav">
        ${nav.map(([screen, icon, label]) => `
          <button class="nav-button ${state.screen === screen ? "active" : ""}" data-action="screen" data-screen="${screen}">
            <span class="nav-emoji">${icon}</span><span>${label}</span>
          </button>`).join("")}
        ${p ? `
        <div class="side-card">
          <h4>${html(personalBoardById(p.personalBoardId).name)}</h4>
          <p>${html(personalBoardById(p.personalBoardId).style)}</p>
          <div class="mini-list">
            ${p.ticketIds.map((id) => { const t = ticket(id); const done = p.goalsDone.includes(id); return `<div class="mini-line ${done ? "done" : ""}">${html(t.name)} <strong>${done ? "+" + t.lp : "−" + t.penalty}</strong></div>`; }).join("")}
          </div>
        </div>` : ""}
      </aside>`;
  }

  function renderScreen() {
    if (state.setupPhase === "characters") return renderCharacterSelect();
    if (state.setupPhase === "tickets") return renderTicketDraft();
    if (!state.gameStarted && !state.result && state.screen !== "setup" && state.screen !== "guide" && state.screen !== "simulation") return renderSetup();
    return ({
      setup: renderSetup, board: renderBoard, players: renderPlayers, goals: renderGoals, drawgoals: renderDrawGoals, draft: renderDraft, spend: renderSpend, transfer: renderTransfer,
      accounts: renderAccounts, passport: renderPassport, results: renderResults, simulation: renderSimulation, guide: renderGuide
    }[state.screen] || renderBoard)();
  }

  function renderSetup() {
    const aiCount = Math.max(0, state.playerSetup.totalPlayers - state.playerSetup.humanPlayers);
    return `
      <section class="card-panel paper setup-hero">
        <div class="eyebrow">Points Passport</div>
        <h1>Different lives. Different dreams. Same points game.</h1>
        <p>Pick a character with a distinct seasonal income, lifestyle cost, and idea of a life well lived. A Surgeon may earn twice as much as an Artist, but the Artist gets more meaning from culture and historic places. Win by matching cards, points, and experiences to your character's values.</p>
        <div class="setup-grid">
          <label class="setup-control"><span>Total players</span>
            <select data-action="setup-select" data-setup-key="totalPlayers">
              ${[2, 3, 4, 5].map((n) => `<option value="${n}" ${state.playerSetup.totalPlayers === n ? "selected" : ""}>${n}</option>`).join("")}
            </select>
          </label>
          <label class="setup-control"><span>Real players</span>
            <select data-action="setup-select" data-setup-key="humanPlayers">
              ${[1, 2, 3, 4, 5].filter((n) => n <= state.playerSetup.totalPlayers).map((n) => `<option value="${n}" ${state.playerSetup.humanPlayers === n ? "selected" : ""}>${n}</option>`).join("")}
            </select>
          </label>
          <label class="setup-control"><span>Years (length)</span>
            <select data-action="setup-select" data-setup-key="years">
              ${[2, 3].map((n) => `<option value="${n}" ${(state.playerSetup.years || DEFAULT_YEARS) === n ? "selected" : ""}>${n} years · ${n * SEASONS_PER_YEAR} months</option>`).join("")}
            </select>
          </label>
          <div class="setup-control"><span>AI seats</span><strong>${aiCount}</strong></div>
          <button class="primary-button" data-action="start-game">Start game</button>
        </div>
      </section>
      <section class="grid-2">
        <div class="card-panel">
          <h2>How a turn works</h2>
          <div class="mini-list">
            <div class="mini-line">Each Season<strong>up to ${ACTIONS_PER_TURN} actions</strong></div>
            <div class="mini-line">Apply · Pay Bills · Transfer<strong>build your engine</strong></div>
            <div class="mini-line">Experience<strong>claim from the shared board</strong></div>
            <div class="mini-line">Rivals act between your turns<strong>cards disappear</strong></div>
          </div>
        </div>
        <div class="card-panel">
          <h2>Realistic points</h2>
          <div class="mini-list">
            <div class="mini-line">Welcome bonus<strong>Spend $4,000 → 60,000 pts</strong></div>
            <div class="mini-line">First Class to Tokyo<strong>90,000 Travel</strong></div>
            <div class="mini-line">Annual fees<strong>$0 – $550</strong></div>
            <div class="mini-line">Credit Score<strong>300 – 850</strong></div>
          </div>
        </div>
      </section>`;
  }

  function expenseWord(mult) { return mult > 1.05 ? "Higher" : mult < 0.95 ? "Lower" : "Normal"; }

    if (!ch.costDiscount) return "No personal discount";
    return `${fmtPts(ch.costDiscount.amount)} off ${ch.costDiscount.tags.join(" / ")} costs`;
