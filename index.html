  function renderCharacterSelect() {
    const chooser = activeCharacterChooser();
    if (!chooser) return "";
    const limited = state.playerSetup.humanPlayers === 1 && !meta.advancedUnlocked;
    const playable = selectableCharacters();
    const locked = limited ? characters.filter((c) => !c.starter) : [];
    return `
      <section class="card-panel paper">
        <div class="eyebrow">Choose your character · ${html(chooser.name)}</div>
        <h1>Who are you in the points game?</h1>
        <p>Each character has a different seasonal income, lifestyle cost, taste profile, and signature skill.${limited ? " These two starters are the easiest to clear — win one game to unlock six advanced characters and their achievements." : " High salary helps with fees; deep personal taste can make cheaper experiences score more."}</p>
      </section>
      <section class="character-grid">
        ${playable.map((c) => renderCharacterCard(c, false)).join("")}
        ${locked.map((c) => renderCharacterCard(c, true)).join("")}
      </section>`;
  }
  function renderCharacterCard(ch, locked) {
    const bonus = ch.lpAllMult ? `+${Math.round((ch.lpAllMult - 1) * 100)}% LP on everything` : `+${Math.round((ch.lpMult - 1) * 100)}% LP on ${ch.lpBonusTags.join(" / ")}`;
    const isStarter = !!ch.starter;
    return `
      <article class="character-card ${locked ? "locked" : ""}">
        ${isStarter && !locked ? `<div class="starter-flag">Starter · easy to clear</div>` : ""}
        <div class="character-top" style="background:linear-gradient(135deg, ${ch.color1}, ${ch.color2})">
          <div class="character-portrait" style="${characterPortraitStyle(ch)}"><span>${ch.emoji}</span></div>
          <div><div class="character-name">${html(ch.name)}</div><div class="character-title">${html(ch.title)}</div></div>
        </div>
        <p class="character-tagline">${html(ch.tagline)}</p>
        <p class="character-intro">${html(ch.intro)}</p>
        <div class="character-stats">
          <div><span>Income / Season</span><strong>${fmtCash(ch.paycheck)}</strong></div>
          <div><span>Lifestyle cost</span><strong>${expenseWord(ch.expenseMult)}</strong></div>
          <div><span>Start cash</span><strong>${fmtCash(ch.startCash)}</strong></div>
          <div><span>Credit score</span><strong>${ch.startScore}</strong></div>
          <div><span>Flexible</span><strong>${fmtPts(ch.startFlexible)}</strong></div>
          <div><span>LP bonus</span><strong>${html(bonus)}</strong></div>
          <div class="wide"><span>Taste discount</span><strong>${html(characterDiscountText(ch))}</strong></div>
        </div>
        <div class="character-skill"><span>★ ${html(ch.skill.name)}</span>${html(ch.skill.text)}</div>
        ${locked
          ? `<div class="character-locked">🔒 Win one game to unlock ${html(ch.name)}</div>`
          : `<button class="primary-button" data-action="pick-character" data-char="${ch.id}">Play as ${html(ch.name)}</button>`}
      </article>`;
  }

  function renderTicketDraft() {
    const chooser = activeTicketChooser();
    if (!chooser) return "";
    const sel = state.ticketSelection || [];
    return `
      <section class="card-panel paper">
        <div class="eyebrow">Bucket List Draft · ${html(chooser.name)}</div>
        <h1>Choose the luxury life you'll chase.</h1>
        <p>You are dealt 3 concrete luxury life experiences. <strong>Keep at least 1</strong> — keep more for more upside. Each can be paid different ways later (points, a card's signon bonus, or cash). Fulfill them for Life Points; leave one undone and you lose points to <em>disappointment</em>. (Inspired by Ticket to Ride destination tickets.)</p>
      </section>
      <section class="card-panel">
        <div class="section-heading"><div><h2>Your three goals</h2><p>${sel.length} kept · risk grows with each goal you keep.</p></div>
          <button class="primary-button" ${sel.length >= 1 ? "" : "disabled"} data-action="confirm-tickets">Keep ${sel.length || "…"} goal${sel.length === 1 ? "" : "s"}</button>
        </div>
        <div class="draft-grid">
          ${chooser.ticketOffer.map((id) => {
            const t = ticket(id);
            const kept = sel.includes(id);
            return `
            <article class="strategy-card ${kept ? "selected" : ""}">
              <div class="strategy-card-head"><h3>${html(t.name)}</h3><span class="badge ${kept ? "good" : "warn"}">+${t.lp} / −${t.penalty} LP</span></div>
              <p>${html(t.tags.join(" · "))}</p>
              <div class="goal-options"><span class="goal-options-label">Pay any one way:</span>${t.costs.map((o) => `<span class="goal-option">${html(goalOptionTextForPlayer(chooser, t, o))}</span>`).join("")}</div>
              <button class="${kept ? "ghost-button" : "primary-button"}" data-action="toggle-ticket" data-ticket="${id}">${kept ? "Drop" : "Keep this goal"}</button>
            </article>`;
          }).join("")}
        </div>
      </section>`;
  }

  function renderDrawGoals() {
    const p = humanSeatViewing();
    const offer = drawGoalOffer(p);
    const sel = state.drawSelection || [];
    const canCommit = canSpendAction() && sel.length >= 1;
    return `
      <section class="card-panel">
        <div class="screen-title"><div><div class="eyebrow">Draw action</div><h1>Pick more luxury life experiences.</h1><p>Draw new goal cards and <strong>keep at least 1</strong>. More goals mean more potential LP — but every kept goal you don't fulfill costs you disappointment points. Drawing uses one action.</p></div>
          <button class="primary-button" ${canCommit ? "" : "disabled"} data-action="commit-drawgoals">Keep ${sel.length || "…"} & end action</button>
        </div>
        <div class="draft-grid">
          ${offer.map((id) => {
            const t = ticket(id);
            const kept = sel.includes(id);
            return `
            <article class="strategy-card ${kept ? "selected" : ""}">
              <div class="strategy-card-head"><h3>${html(t.name)}</h3><span class="badge ${kept ? "good" : "warn"}">+${t.lp} / −${t.penalty} LP</span></div>
              <p>${html(t.tags.join(" · "))}</p>
              <div class="goal-options"><span class="goal-options-label">Pay any one way:</span>${t.costs.map((o) => `<span class="goal-option">${html(goalOptionTextForPlayer(p, t, o))}</span>`).join("")}</div>
              <button class="${kept ? "ghost-button" : "primary-button"}" data-action="toggle-drawgoal" data-ticket="${id}">${kept ? "Drop" : "Keep this goal"}</button>
            </article>`;
          }).join("") || `<div class="empty-selection">You already hold every life experience in the deck.</div>`}
        </div>
      </section>`;
  }

  function renderGoals() {
    const p = humanSeatViewing();
    const canAct = canSpendAction();
    return `
      <section class="card-panel">
        <div class="screen-title"><div><div class="eyebrow">Goal action</div><h1>Fulfill your luxury bucket list.</h1><p>Pay a goal any one way — points, a card's signon bonus, or cash. Fulfilling uses one action. Unfulfilled goals you kept cost you LP at the end.</p></div><span class="badge good">${p.goalsDone.length}/${p.ticketIds.length} done</span></div>
        <div class="experience-grid">
          ${p.ticketIds.map((id) => {
            const t = ticket(id);
            const done = p.goalsDone.includes(id);
            const pay = !done ? chooseGoalPayment(p, t) : null;
            return `
            <article class="experience-card ${done ? "done" : ""}">
              <div class="experience-city">${html(t.tags.join(" · "))} · +${t.lp} LP</div>
              <h3>${html(t.name)}</h3>
              <div class="goal-options">${t.costs.map((o) => `<span class="goal-option ${optionAffordable(p, o, t) ? "ok" : ""}">${html(goalOptionTextForPlayer(p, t, o))}</span>`).join("")}</div>
              <div class="mini-line">Disappointment if missed <strong>−${t.penalty} LP</strong></div>
              <div class="actions">
                <button class="primary-button compact" ${canAct && pay ? "" : "disabled"} data-action="fulfill" data-goal="${id}">${done ? "Fulfilled ✓" : pay ? `Fulfill (${goalOptionText(pay)})` : "Can't afford yet"}</button>
              </div>
            </article>`;
          }).join("") || `<div class="log-entry">No goals kept.</div>`}
        </div>
      </section>`;
  }

  // Single bottom menu — consolidates the old top tab bar + action dock into one fixed
  // location. Every screen the player navigates to, carrying the tab bar's icons; End turn
  // and actions-left live alongside. `[screen, icon, label]`.
  const DOCK_TABS = [
    ["board", "▦", "Board"],
    ["draft", "▣", "Apply"],
    ["spend", "◫", "Pay Bills"],
    ["transfer", "⇄", "Transfer"],
    ["goals", "◎", "Goals"],
    ["drawgoals", "◇", "Draw"],
    ["accounts", "≡", "Accounts"],
    ["players", "♟", "Players"],
    ["passport", "★", "Passport"],
    ["simulation", "％", "Sim"]
  ];
  function renderTurnPanel() {
    const p = activePlayer();
    const youTurn = isHumanTurn();
    const left = state.actionsLeft;
    return `
      <section class="turn-panel ${youTurn ? "your-turn" : ""} ${youTurn && left <= 0 ? "spent-turn" : ""}">
        <div class="turn-head">
          <div>
            <div class="eyebrow">${youTurn ? "Your turn" : "Table"}</div>
            <h2>${html(p ? p.name : "")} · Year ${state.year}, Month ${state.season}</h2>
            <p>${left > 0 ? `Take up to <strong>${left} more action${left === 1 ? "" : "s"}</strong> this Season. Your turn ends only when you click <strong>End my turn</strong>.` : `<strong>No actions left.</strong> Click <strong>End my turn</strong> to let the other players go.`}</p>
          </div>
          <div class="turn-head-right">
            <div class="actions-left" aria-label="Actions remaining">
              ${Array.from({ length: ACTIONS_PER_TURN }, (_, i) => `<span class="${i < left ? "live" : "spent"}"></span>`).join("")}
              <em>${left} action${left === 1 ? "" : "s"} left</em>
            </div>
            <div class="season-dots">${Array.from({ length: SEASONS_PER_YEAR }, (_, i) => `<span class="${i + 1 < state.season ? "done" : i + 1 === state.season ? "active" : ""}"></span>`).join("")}</div>
          </div>
        </div>
      </section>`;
  }

  // Fixed action dock: every available turn action + End turn, always on screen during the
  // main game loop. Disabled when it isn't the human's turn or actions are spent.
  function renderActionDock() {
    const youTurn = isHumanTurn();
    const left = state.actionsLeft;
    return `
      <nav class="action-dock ${youTurn ? "your-turn" : ""}" aria-label="Menu and actions">
        <div class="action-dock-inner">
          <div class="dock-tabs">
            ${DOCK_TABS.map(([screen, icon, label]) => `
              <button class="dock-tab ${state.screen === screen ? "active" : ""}" data-action="screen" data-screen="${screen}"><span class="dock-tab-ic">${icon}</span><span class="dock-tab-lbl">${html(label)}</span></button>`).join("")}
          </div>
          <div class="dock-end-wrap">
            <span class="dock-status">${youTurn ? `<strong>${left}</strong> action${left === 1 ? "" : "s"} left` : "Rivals playing…"}</span>
            <button class="dock-end ${left <= 0 ? "primary-button" : "secondary-button"}" ${youTurn ? "" : "disabled"} data-action="end-turn">End turn →</button>
          </div>
        </div>
      </nav>`;
  }

  function renderActivityBanner() {
    if (!state.activity.length) return "";
    return `
      <section class="activity-banner">
        <strong>Since your last turn</strong>
        <ul>${state.activity.slice(-6).map((line) => `<li>${html(line)}</li>`).join("")}</ul>
      </section>`;
  }

  function renderBoard() {
    return `
      <section class="card-panel board-hero" id="board-rows">
        <div class="screen-title">
          <div>
            <div class="eyebrow">Life Experience Board</div>
            <h1>Claim the life your character values most.</h1>
            <p>Shared, limited experiences. Your character's taste can change both cost and LP value.</p>
          </div>
        </div>
        ${["everyday", "premium", "dream"].map(renderExperienceRow).join("")}
      </section>
      <section class="grid-2">
        <div class="card-panel">
          <div class="section-heading"><div><h2>Your Bucket List Goals</h2><p>Secret aspirations you drafted. Fulfill them for LP; leave one undone and you lose points to disappointment.</p></div><button class="ghost-button compact" data-action="screen" data-screen="goals">Fulfill →</button></div>
          ${humanSeatViewing().ticketIds.map((id) => renderTicket(id, humanSeatViewing())).join("")}
        </div>
        <div class="card-panel">
          <h2>Play log</h2>
          <div class="log">${state.log.slice(0, 9).map((line) => `<div class="log-entry">${html(line)}</div>`).join("")}</div>
        </div>
      </section>`;
  }

  function renderEvent() {
    const ev = currentEvent();
    return `<div class="event-card board-event"><div class="event-icon">!</div><div><strong>${html(ev.name)}</strong><p>${html(ev.text)}</p></div></div>`;
  }

  function renderPlayerStrip() {
    const active = activePlayer();
    const sorted = state.players.map((p) => ({ p, s: scorePlayer(p) }));
    return `
      <div class="strip-head"><h2>All players</h2><button class="ghost-button compact" data-action="screen" data-screen="players">View full status →</button></div>
      <section class="player-strip">
        ${sorted.map(({ p, s }) => {
          const lp = lpBreakdown(p);
          const isActive = active && active.seat === p.seat;
          return `
          <article class="status-card ${p.isHuman ? "you" : ""} ${isActive ? "active-turn" : ""}">
            <div class="status-top">
              <div><strong>${html(p.name)}</strong><span class="status-sub">${html(p.characterId ? character(p.characterId).emoji + " " + character(p.characterId).name + " · " + character(p.characterId).title : p.isHuman ? personalBoardById(p.personalBoardId).name : strategy(p.strategyId).name)}</span></div>
              <div class="status-lp">${s.total}<span>LP</span></div>
            </div>
            <div class="lp-bars">
              ${lpCategories.map((cat) => `<div class="lp-bar"><span class="lp-bar-label">${cat.label.split(" & ")[0]}</span><strong>${lp[cat.key]}</strong></div>`).join("")}
            </div>
            <div class="status-foot">
              <span class="badge ${["Score Risk","In Debt"].includes(pressureTag(p)) ? "bad" : pressureTag(p) === "Can Claim" ? "good" : "warn"}">${pressureTag(p)}</span>
              <span class="status-meta">${p.claimed.length} claims · Score ${Math.round(p.score)}${p.debt > 0 ? ` · <span class="risk">owes ${fmtCash(p.debt)}</span>` : ""}</span>
            </div>
            <div class="status-last">${html(p.lastAction)}</div>
            ${(() => { const it = playerIntent(p); return it ? `<div class="status-intent ${it.urgent ? "urgent" : ""}">${it.urgent ? "⚡ " : "🎯 "}${html(it.text)}</div>` : ""; })()}
          </article>`;
        }).join("")}
      </section>`;
  }

  function renderPlayers() {
    const active = activePlayer();
    const ranked = state.players.map((p) => ({ p, s: scorePlayer(p) })).sort((a, b) => b.s.total - a.s.total);
    return `
      <section class="card-panel">
        <div class="screen-title"><div><div class="eyebrow">All Players</div><h1>Read the table.</h1><p>Each player has a different income and taste profile. This is who is turning their own life into the most Life Points.</p></div>${state.gameStarted ? `<span class="badge">Year ${state.year} · Season ${state.season}</span>` : ""}</div>
        <div class="players-full">
          ${ranked.map(({ p, s }, i) => {
            const lp = lpBreakdown(p);
            return `
            <article class="player-full ${p.isHuman ? "you" : ""} ${active && active.seat === p.seat ? "active-turn" : ""}">
              <div class="player-full-head">
                <div><span class="rank-chip">#${i + 1}</span><strong>${html(p.name)}</strong><span class="status-sub">${html(p.characterId ? character(p.characterId).emoji + " " + character(p.characterId).name + " · " + character(p.characterId).title : p.isHuman ? personalBoardById(p.personalBoardId).name : strategy(p.strategyId).name)}</span></div>
                <div class="status-lp">${s.total}<span>LP</span></div>
              </div>
              <div class="lp-bars">${lpCategories.map((cat) => `<div class="lp-bar"><span class="lp-bar-label">${cat.label}</span><strong>${lp[cat.key]}</strong></div>`).join("")}</div>
              <div class="point-row">
                ${POINTS.map((k) => `<div class="point-chip"><span>${pointMeta[k].icon} ${pointLabel(k)}</span><strong>${fmtPts(p.res[k])}</strong></div>`).join("")}
                <div class="point-chip"><span>$ Cash</span><strong>${fmtCash(p.cash)}</strong></div>
                <div class="point-chip"><span>🛡 Score</span><strong>${Math.round(p.score)} · ${scoreBand(p.score)}</strong></div>
              </div>
              <div class="status-foot">
                <span class="badge ${["Score Risk","In Debt"].includes(pressureTag(p)) ? "bad" : pressureTag(p) === "Can Claim" ? "good" : "warn"}">${pressureTag(p)}</span>
                <span class="status-meta">${p.claimed.length} claims · ${openAccts(p).length} cards${p.debt > 0 ? ` · <span class="risk">owes ${fmtCash(p.debt)}</span>` : ""}${s.pendingRisk ? ` · <span class="risk">−${s.pendingRisk} LP at risk</span>` : ""}</span>
              </div>
              ${(() => { const it = playerIntent(p); return it ? `<div class="status-intent ${it.urgent ? "urgent" : ""}">${it.urgent ? "⚡ " : "🎯 "}${html(it.text)}</div>` : ""; })()}
              <div class="status-last">Last: ${html(p.lastAction)}</div>
            </article>`;
          }).join("")}
        </div>
      </section>`;
  }

  function renderExperienceRow(band) {
    const label = { everyday: "Everyday Joys", premium: "Premium Trips", dream: "Dream Experiences" }[band];
    const note = { everyday: "2–4 LP", premium: "5–7 LP", dream: "8–12 LP" }[band];
    return `
      <div class="experience-row">
        <div class="row-heading"><h2>${label}</h2><span>${note}</span></div>
        <div class="experience-grid row-cards">${(state.board[band] || []).map((id) => renderBoardExperience(exp(id))).join("")}</div>
      </div>`;
  }

  function renderBoardExperience(e) {
    if (!e) return "";
    const p = humanSeatViewing();
    const cost = p && isHumanTurn() ? affordableCost(p, e) : null;
    const displayCosts = p ? (e.costs || []).map((c) => adjustCost(e, c, p)) : e.costs;
    const displayLp = p ? lpValue(p, e) : e.lp;
    const canClaim = canSpendAction() && cost;
    return `
      <article class="experience-card band-${e.band}">
        <div class="experience-city">${e.band} · ${displayLp} LP</div>
        <h3>${html(e.name)}</h3>
        <p>${e.tags.map(html).join(" · ")}</p>
        <div class="mini-line">Cost <strong>${html(costsText(displayCosts))}</strong></div>
        <div class="actions">
          <button class="primary-button compact" ${canClaim ? "" : "disabled"} data-action="claim" data-experience="${e.id}">${canClaim ? "Claim (uses turn)" : "Need points"}</button>
        </div>
      </article>`;
  }

  function renderTicket(id, player) {
    const t = ticket(id);
    const done = player.goalsDone.includes(id);
    const affordable = !done && goalAffordable(player, t);
    return `<div class="journey-card ${done ? "complete" : ""}"><div><strong>${html(t.name)}</strong><p>${html(t.tags.join(" · "))} · Pay: ${t.costs.map((o) => html(goalOptionTextForPlayer(player, t, o))).join(" or ")}</p></div><span class="badge ${done ? "good" : affordable ? "good" : "warn"}">${done ? "✓ +" + lpValue(player, t) : affordable ? "Ready · +" + lpValue(player, t) : "+" + lpValue(player, t) + " / −" + t.penalty}</span></div>`;
  }

  function renderDraft() {
    const p = humanSeatViewing();
    const offer = state.cardMarket || [];
    const owned = new Set(p.wallet.map((a) => a.id));
    const selected = state.draftSelection;
    const selectable = selected && offer.includes(selected) && !owned.has(selected);
    const canCommit = canSpendAction() && selectable && openAccts(p).length < WALLET_LIMIT;
    return `
      <section class="card-panel">
        <div class="screen-title">
          <div><div class="eyebrow">Apply action</div><h1>Pick a credit card offer.</h1><p>Three offers are face-up from the deck. Apply for one (uses an action, −15 Credit Score) and a new offer is revealed in its place.</p></div>
          <span class="badge ${openAccts(p).length >= WALLET_LIMIT ? "bad" : "good"}">${openAccts(p).length}/${WALLET_LIMIT} cards</span>
        </div>
        <div class="draft-selection-panel">
          <div><div class="eyebrow">Selected</div><h2>${selected ? html(card(selected).name) : "No offer selected"}</h2><p>${selected ? html(card(selected).bonus.label) : "Tap one of the offers below."}</p></div>
          <div class="draft-selection-actions">
            <button class="primary-button" ${canCommit ? "" : "disabled"} data-action="commit-apply">Apply for card</button>
            <button class="ghost-button" ${selected ? "" : "disabled"} data-action="clear-draft">Clear</button>
          </div>
        </div>
        <div class="market-head"><span class="eyebrow">Offers under review</span><span class="deck-count">${(state.cardDeck || []).length} more in the deck</span></div>
        <div class="draft-grid">${offer.map((id) => renderDraftCard(card(id), p)).join("") || `<div class="empty-selection">The offer deck is empty.</div>`}</div>
      </section>
      <section class="card-panel">
        <div class="section-heading"><div><h2>Your wallet</h2><p>Open accounts earning points and welcome bonuses.</p></div><span class="badge">${openAccts(p).length} open</span></div>
        <div class="wallet-row">${openAccts(p).map(({ account, card: c }) => renderWalletCard(account, c)).join("")}</div>
      </section>`;
  }

  function renderDraftCard(c, player) {
    if (!c) return "";
    const selected = state.draftSelection === c.id;
    const owned = player.wallet.some((a) => a.id === c.id && a.status !== "closed");
    const blocked = c.scoreRequired && player.score < c.scoreRequired;
    const label = owned ? "Already in wallet" : blocked ? "Score too low" : selected ? "Selected" : "Select offer";
    return `
      <article class="strategy-card ${selected ? "selected" : ""} ${owned ? "owned" : ""}">
        <div class="strategy-card-head"><h3>${html(c.name)}</h3><span class="badge ${c.fee ? "warn" : "good"}">${c.fee ? fmtCash(c.fee) + "/yr" : "No fee"}</span></div>
        <p>${html(c.perk)}</p>
        <div class="mini-line">Welcome <strong>${html(c.bonus.label)}</strong></div>
        <div class="mini-line">Focus <strong>${pointLabel(c.focus)}${c.cashback ? " · " + fmtCash(c.cashback) + " cashback" : ""}</strong></div>
        ${c.scoreRequired ? `<div class="mini-line">Needs Credit Score <strong>${c.scoreRequired}</strong></div>` : ""}
        <button class="${selected ? "ghost-button" : "primary-button"}" ${owned || blocked ? "disabled" : ""} data-action="select-draft" data-card="${c.id}">${label}</button>
      </article>`;
  }

  function renderWalletCard(account, c) {
    const pct = c.bonus ? clamp((account.spendProgress / c.bonus.needSpend) * 100, 0, 100) : 0;
    return `
      <div class="credit-card board-credit-card" style="background:linear-gradient(135deg, ${c.focus === "travel" ? "#2c6fd8" : c.focus === "dining" ? "#d9554f" : "#48a86b"}, #17223a)">
        <div class="chip"></div>
        <div class="card-name">${html(c.name)}</div>
        <div class="tiny">${c.fee ? fmtCash(cardFee(c)) + "/yr" : "No fee"} · Age ${account.age} · ${account.status}</div>
        <div class="progress-row">
          <div class="progress-label"><span>Welcome bonus</span><span>${account.bonusEarned ? "Earned" : fmtCash(account.spendProgress) + "/" + fmtCash(c.bonus.needSpend)}</span></div>
          <div class="progress-track"><div class="progress-fill green" style="width:${account.bonusEarned ? 100 : pct}%"></div></div>
        </div>
      </div>`;
  }

  function renderSpend() {
    const p = humanSeatViewing();
    const assignments = { ...autoAssignments(p), ...state.spendAssignments };
    const accounts = openAccts(p);
    const canCommit = canSpendAction();
    const pay = p.paycheck || PAYCHECK;
    const em = p.expenseMult || 1;
    const totals = {};
    for (const cat of spendCategories) {
      const c = card(assignments[cat.id]) || accounts[0]?.card;
      for (const [k, mult] of Object.entries(earnFor(c, cat.id))) totals[k] = (totals[k] || 0) + Math.round(cat.amount * em) * mult;
    }
    return `
      <section class="card-panel">
        <div class="screen-title">
          <div><div class="eyebrow">Pay Bills action</div><h1>Cash your paycheck, pay the bills.</h1><p>Your ${fmtCash(pay)} paycheck covers your fixed expenses. Charge each to the card that earns the most points (or chases a welcome bonus). You never pay cash for luxury — only points.</p></div>
          <button class="primary-button" ${canCommit ? "" : "disabled"} data-action="commit-spend">Cash paycheck & pay bills</button>
        </div>
        <div class="paycheck-banner">
          <div class="paycheck-amt"><span>This season's paycheck</span><strong>${fmtCash(pay)}</strong></div>
          <div class="paycheck-note">Every dollar of expenses earns points. Leftover (from cashback cards) is just savings — luxury is bought with points, not cash.</div>
        </div>
        ${p.debt > 0 ? `<div class="apr-warning">⚠ You're carrying ${fmtCash(p.debt)} in credit card debt at ${APR_ANNUAL}% APR (~6%/season). It grows every season until you pay it down — paying your bills uses spare cash to chip it away.</div>` : ""}
        <div class="spend-board">
          ${spendCategories.map((cat) => {
            const amt = Math.round(cat.amount * em);
            const c = card(assignments[cat.id]) || accounts[0]?.card;
            const reward = earnFor(c, cat.id);
            const rewardStr = Object.entries(reward).map(([k, mult]) => `${mult}x → ${fmtPts(amt * mult)} ${pointLabel(k)}`).join(" + ");
            return `
            <article class="spend-cube">
              <div class="purchase-amount">${fmtCash(amt)}</div>
              <div><h3>${html(cat.merchant)} <span class="cube-count">${html(cat.label)}</span></h3><p>${html(cat.detail)}</p></div>
              <select data-action="assign-spend" data-category="${cat.id}">
                ${accounts.map(({ account, card: cc }) => `<option value="${account.id}" ${assignments[cat.id] === account.id ? "selected" : ""}>${html(cc.name)}</option>`).join("")}
              </select>
              <div class="reward-preview"><strong>${html(rewardStr || "No earning")}</strong></div>
            </article>`;
          }).join("")}
        </div>
      </section>
      <section class="card-panel">
        <h2>Credit card points earned this action</h2>
        <div class="summary-row">${Object.entries(totals).map(([k, v]) => `<div class="summary-tile"><div class="label">${pointLabel(k)}</div><div class="big">${fmtPts(v)}</div><span>${k === "cash" ? "cash" : "points"}</span></div>`).join("")}</div>
      </section>`;
  }

  function renderTransfer() {
    const p = humanSeatViewing();
    const choice = state.transferSelection;
    const canCommit = canSpendAction() && choice && p.res.flexible >= choice.amount;
    return `
      <section class="card-panel">
        <div class="screen-title">
          <div><div class="eyebrow">Transfer action</div><h1>Move Flexible points.</h1><p>Transfer Flexible into Travel or Dining — best during a bonus window. One-way, and it uses your turn.</p></div>
          <span class="badge warn">${html(currentEvent().name)}</span>
        </div>
        <div class="transfer-selection-panel">
          <div><div class="eyebrow">Selected</div><h2>${choice ? `${fmtPts(choice.amount)} → ${fmtPts(playerTransferOutput(p, choice.amount, choice.target))} ${pointLabel(choice.target)}` : "No transfer selected"}</h2><p>You hold ${fmtPts(p.res.flexible)} Flexible.</p></div>
          <div class="draft-selection-actions">
            <button class="primary-button" ${canCommit ? "" : "disabled"} data-action="commit-transfer">Confirm transfer</button>
            <button class="ghost-button" ${choice ? "" : "disabled"} data-action="clear-transfer">Clear</button>
          </div>
        </div>
        <div class="partner-grid">
          ${transferTargets.map((target) => {
            const mult = playerTransferMult(p, target);
            return `
            <article class="partner-card ${choice && choice.target === target ? "selected" : ""}">
              <div class="partner-icon">${pointMeta[target].icon}</div>
              <h3>${pointLabel(target)} points</h3>
              <p>This Year's multiplier: <strong>${Math.round(mult * 100)}%</strong></p>
              <div class="actions">
                ${[20000, 40000].map((amount) => {
                  const sel = choice && choice.target === target && choice.amount === amount;
                  return `<button class="${sel ? "ghost-button" : "primary-button"} compact" ${p.res.flexible < amount ? "disabled" : ""} data-action="select-transfer" data-target="${target}" data-amount="${amount}">${sel ? "Unselect" : `${fmtPts(amount)} → ${fmtPts(playerTransferOutput(p, amount, target))}`}</button>`;
                }).join("")}
              </div>
            </article>`;
          }).join("")}
        </div>
      </section>`;
  }

  function renderAccounts() {
    const p = humanSeatViewing();
    const canAct = canSpendAction();
    return `
      <section class="card-panel">
        <div class="screen-title">
          <div><div class="eyebrow">Account action</div><h1>Keep, downgrade, or close one card.</h1><p>A single account move uses your turn. Annual fees are charged at the end of each Year.</p></div>
          <span class="badge ${p.score >= 740 ? "good" : p.score >= 670 ? "warn" : "bad"}">Credit Score ${Math.round(p.score)} · ${scoreBand(p.score)}</span>
        </div>
        <div class="account-list">${p.wallet.map((a) => renderAccountRow(a, canAct, p)).join("")}</div>
      </section>`;
  }

  function renderAccountRow(account, canAct, player) {
    const c = card(account.id);
    const closed = account.status === "closed";
    const hit = account.age <= 1 ? 25 : 10;
    return `
      <article class="account-row ${closed ? "closed" : ""}">
        <div><strong>${html(c.name)}</strong><p>${closed ? "Closed account" : html(c.perk)}</p></div>
        <div class="account-stats">
          <span class="badge ${cardFee(c) ? "warn" : "good"}">${cardFee(c) ? fmtCash(cardFee(c)) + "/yr" : "No fee"}</span>
          <span class="badge">Age ${account.age}</span><span class="badge">${account.status}</span>
        </div>
        <div class="account-actions">
          <button class="secondary-button compact" ${canAct && !closed && account.status !== "downgraded" ? "" : "disabled"} data-action="account" data-card="${account.id}" data-op="downgrade">Downgrade</button>
          <button class="danger-button compact" ${canAct && !closed ? "" : "disabled"} data-action="account" data-card="${account.id}" data-op="close">Close −${hit}</button>
        </div>
      </article>`;
  }

  function renderPassport() {
    const p = humanSeatViewing();
    const s = scorePlayer(p);
    return `
      <section class="card-panel">
        <div class="screen-title"><div><div class="eyebrow">Passport</div><h1>The life you are building.</h1><p>Score from claimed experiences, fulfilled goals, and personal milestones. ${s.pendingRisk ? `You have <strong>−${s.pendingRisk} LP at risk</strong> from goals you still need to fulfill before Year 3.` : "All your kept goals are fulfilled."}</p></div><span class="badge good">${s.total} LP</span></div>
        <div class="bucket-card">
          <h3>${html(personalBoardById(p.personalBoardId).name)}</h3><p>${html(personalBoardById(p.personalBoardId).style)}</p>
          ${milestonesFor(p).map((m) => `<div class="milestone ${m.complete ? "complete" : ""}"><span>${m.complete ? "✓" : "○"}</span><div>${html(m.text)} <strong>${m.lp} LP</strong></div></div>`).join("")}
        </div>
      </section>
      <section class="card-panel">
        <h2>Experiences claimed</h2>
        <div class="experience-grid">${claimedExps(p).map((e) => `<article class="experience-card done"><div class="experience-city">${e.band} · ${e.lp} LP</div><h3>${html(e.name)}</h3><p>${e.tags.map(html).join(" · ")}</p></article>`).join("") || `<div class="log-entry">No experiences claimed yet.</div>`}</div>
      </section>`;
  }

  function renderResults() {
    const result = state.result;
    if (!result) return `<section class="card-panel"><h1>No game finished yet.</h1><button class="primary-button" data-action="screen" data-screen="setup">Start a game</button></section>`;
    return `
      <section class="card-panel paper result-panel">
        <div class="eyebrow">Final Score</div>
        <h1>${html(result.ranked[0].player.name)} wins</h1>
        <p>Different jobs, different dreams, one points game. This is who built the richest life with smarter card, timing, and transfer decisions.</p>
        <div class="results-table">
          ${result.ranked.map((r, i) => `
            <div class="result-row ${r.player.isHuman ? "you" : ""}">
              <span class="result-rank">${i + 1}</span>
              <span class="result-name">${html(r.player.name)}</span>
              <span class="result-detail">${r.score.experiences} exp · ${r.score.tickets >= 0 ? "+" : ""}${r.score.tickets} tickets · ${r.score.personal} personal</span>
              <span class="result-total">${r.score.total} LP</span>
            </div>`).join("")}
        </div>
        ${meta.advancedUnlocked && meta.gamesCleared >= 1 ? `<div class="result-unlock">✦ Advanced cast unlocked — pick a new character next game for more achievements.</div>` : ""}
        <div class="actions"><button class="primary-button" data-action="reset">Play again</button><button class="ghost-button" data-action="open-achievements">🏆 Achievements ${achievementsUnlockedCount()}/${ACHIEVEMENTS.length}</button><button class="secondary-button" data-action="screen" data-screen="passport">Review Passport</button></div>
      </section>`;
  }

  function renderSimulation() {
    const results = state.simulationResults;
    return `
      <section class="card-panel">
        <div class="screen-title"><div><div class="eyebrow">Balance Lab</div><h1>Compare strategy strength.</h1><p>Runs full AI games on the real engine to compare archetype win rates.</p></div><button class="primary-button" data-action="run-simulation">Run 120 games</button></div>
        <div class="setup-grid">
          <label class="setup-control"><span>Total players</span><select data-action="setup-select" data-setup-key="totalPlayers">${[2, 3, 4, 5].map((n) => `<option value="${n}" ${state.playerSetup.totalPlayers === n ? "selected" : ""}>${n}</option>`).join("")}</select></label>
          <div class="setup-control"><span>Mode</span><strong>All-AI</strong></div>
        </div>
      </section>
      <section class="card-panel">
        <h2>Strategy win rates</h2>
        ${results ? `<table class="table sim-table"><thead><tr><th>Strategy</th><th>Win rate</th><th>Avg LP</th><th>High</th><th>Games</th></tr></thead><tbody>
          ${results.rows.map((row) => `<tr><td><strong>${html(row.profile.name)}</strong><br><span>${html(row.profile.focus)}</span></td><td>${Math.round(row.winRate * 100)}%</td><td>${row.avgScore.toFixed(1)}</td><td>${row.high}</td><td>${row.games}</td></tr>`).join("")}
        </tbody></table><p class="footer-note">${results.iterations} games at ${results.total} seats. Ties count as wins for all tied strategies.</p>` : `<div class="log-entry">Run the simulator to generate balance data.</div>`}
      </section>`;
  }

  function renderGuide() {
    return `
      <section class="card-panel paper">
        <div class="eyebrow">How to play</div>
        <h1>You can't afford the dream. Your points can.</h1>
        <p>You are playing someone with a specific job, income, lifestyle, and idea of joy: an Artist chasing history, a Surgeon protecting rare time off, a Chef traveling fork-first. Over <strong>3 Years</strong>, turn ordinary bills into points and use those points on the experiences your character values most.</p>
        <div class="guide-actions"><button class="secondary-button" data-action="replay-tutorial">▶ Replay the walkthrough</button><button class="ghost-button" data-action="open-achievements">🏆 Achievements</button></div>
        <div class="grid-3 vision-grid">
          <div><strong>1 · Earn</strong><span>Charge your fixed bills to the right cards and trigger fat welcome bonuses.</span></div>
          <div><strong>2 · Transfer</strong><span>Turn Flexible points into Travel or Dining during bonus windows.</span></div>
          <div><strong>3 · Flex</strong><span>Spend points (never cash) on dream trips and post the most enviable life.</span></div>
        </div>
      </section>
      <section class="card-panel">
        <div class="section-heading"><div><h2>Your first turn, step by step</h2><p>Each Season you get up to ${ACTIONS_PER_TURN} actions, then click "End my turn." Rivals act in between.</p></div></div>
        <div class="mini-list">
          <div class="mini-line">1. <strong>Pick a lane</strong> — income, lifestyle, taste, and discounts shape your strategy</div>
          <div class="mini-line">2. <strong>Apply</strong> for a card whose welcome bonus matches a dream you kept</div>
          <div class="mini-line">3. <strong>Pay Bills</strong> — cash your seasonal income onto your best cards<strong>+ points</strong></div>
          <div class="mini-line">4. <strong>Transfer or Claim</strong> when you can afford something<strong>+ Life Points</strong></div>
          <div class="mini-line">5. <strong>End my turn</strong> and watch the table react<strong>then repeat</strong></div>
        </div>
      </section>
      <section class="card-panel">
        <div class="section-heading"><div><h2>The golden rules</h2></div></div>
        <div class="mini-list">
          <div class="mini-line">Luxury is bought with points or a signon bonus<strong>never cash</strong></div>
          <div class="mini-line">Keep ≥1 bucket-list goal; an unfulfilled one hurts<strong>disappointment</strong></div>
          <div class="mini-line">Pay your bills each Year<strong>or pay APR</strong></div>
          <div class="mini-line">Most Life Points after Year 3<strong>wins</strong></div>
        </div>
        <div class="actions"><button class="primary-button" data-action="open-rules" data-topic="story">Read the full rules</button></div>
      </section>`;
  }

  function renderPassOverlay() {
    const p = state.setupPhase === "tickets" ? activeTicketChooser() : activePlayer();
    return `
      <div class="rules-backdrop">
        <section class="rules-modal pass-modal" role="dialog" aria-modal="true">
          <div class="eyebrow">Pass the device</div>
          <h2>${html(p ? p.name : "")}, it's your turn.</h2>
          <p>Hand the device to ${html(p ? p.name : "the next player")}. Other players should look away — your tickets are secret.</p>
          <button class="primary-button" data-action="continue-pass">Start my turn</button>
        </section>
      </div>`;
  }

  function rulesContent() {
    return {
      story: {
        label: "The Setup", title: "Different lives. Better points.",
        subtitle: "Each character values the world differently.",
        bullets: [
          "Each player picks a character with a different seasonal income, lifestyle cost, taste profile, and signature skill.",
          "Higher income helps with fees and risk. Deeper taste can make the right experiences cheaper and worth more Life Points.",
          "Over 3 Years you build a life that looks like a million bucks. The most Life Points (LP) from luxury experiences wins.",
          "The winner is not simply the richest character. The winner best matches cards, points, and dreams."
        ],
        tip: "Pick a fantasy early: high income and premium fees, lower income and meaningful culture, or efficient living with fewer mistakes."
      },
      turns: {
        label: "Your Turn", title: "A season at a time.",
        subtitle: `Up to ${ACTIONS_PER_TURN} actions, then you pass.`,
        bullets: [
          "The game runs 3 Years of 4 Seasons. Each Season is one turn for you.",
          `Take up to ${ACTIONS_PER_TURN} actions, then click "End my turn." Your rivals act between your turns on the same board, so offers and experiences can vanish.`,
          "Apply — take one credit card offer from the deck (−15 Credit Score).",
          "Pay Bills — cash your paycheck and pay expenses to earn points.",
          "Transfer — convert Flexible points into Travel or Dining.",
          "Experience / Goal — claim a board experience, or fulfill a bucket-list dream.",
          "Account / Draw — manage a card, or draw more goals to chase."
        ],
        tip: "A classic combo: Pay Bills → Transfer during a bonus window → fulfill a Goal."
      },
      earning: {
        label: "Earning", title: "Cards, points & credit.",
        subtitle: "Turn an ordinary paycheck into a points machine.",
        bullets: [
          `Your ${fmtCash(PAYCHECK)} paycheck each Pay Bills covers your fixed bills (rent, groceries, transit). Put each bill on the card that earns the most.`,
          "You earn four point types: Travel, Dining, Everyday, and Flexible (the wildcard).",
          "Welcome bonuses are the jackpot — hit a card's spend target and bank tens of thousands of points at once.",
          "Credit Score (300–850) is your reputation: applying lowers it, premium cards demand a high score, closing young accounts stings.",
          "Annual fees cost real cash; cashback cards keep you in the black.",
          `Pay your bills each Season. Skip one and those bills become a balance charging ${APR_ANNUAL}% APR (~6%/season, compounding) plus a credit-score ding — pay in full and you owe $0, just like real points players.`
        ],
        tip: "Chase one big welcome bonus early; it's worth more than years of ordinary earning."
      },
      luxury: {
        label: "The Luxury", title: "Buy the dream — with points, not cash.",
        subtitle: "Bucket-list goals are how you flex.",
        bullets: [
          "At setup you're dealt 3 secret bucket-list goals (dream trips). Keep at least 1 — keep more for more upside.",
          "Fulfill a goal with points or a card's signon bonus. You never pay a cent of cash for luxury.",
          "Claimed experiences and fulfilled goals become your Life Points.",
          "Beware disappointment: any goal you keep but never fulfill subtracts its penalty at the end.",
          "On a roll? Use the Draw action to pick up more goals mid-game."
        ],
        tip: "Draft the exact card a goal names and its signon bonus can pay for the whole trip."
      },
      winning: {
        label: "Winning", title: "The most enviable life wins.",
        subtitle: "Score the life you built after Year 3.",
        bullets: [
          "Experiences and fulfilled goals score their printed Life Points.",
          "Unfulfilled kept goals subtract their disappointment penalty (final scoring only).",
          "Personal milestones score 3 / 6 / 12 LP.",
          "Most total LP after Year 3 wins; ties broken by experiences claimed."
        ],
        tip: "A modest claim that completes a goal often beats a flashy trip that doesn't."
      }
    };
  }
  function renderRulesOverlay() {
    const topics = ["story", "turns", "earning", "luxury", "winning"];
    const active = (state.rulesOverlay && state.rulesOverlay.topic) || "story";
    const content = rulesContent()[active] || rulesContent().story;
    return `
      <div class="rules-backdrop">
        <section class="rules-modal" role="dialog" aria-modal="true">
          <button class="rules-close-button" data-action="close-rules">&times;</button>
          <div class="rules-head"><div><div class="eyebrow">Rules</div><h2>${html(content.title)}</h2><p>${html(content.subtitle)}</p></div></div>
          <div class="rules-tabs">${topics.map((t) => `<button class="${t === active ? "active" : ""}" data-action="rules-topic" data-topic="${t}">${html(rulesContent()[t].label)}</button>`).join("")}</div>
          <div class="rules-body"><ul>${content.bullets.map((b) => `<li>${html(b)}</li>`).join("")}</ul><div class="rules-tip"><strong>Tip</strong><span>${html(content.tip)}</span></div></div>
          <div class="rules-footer"><button class="rules-done-button" data-action="close-rules">Done</button></div>
        </section>
      </div>`;
  }

  // ----- Event wiring -----------------------------------------------------
  document.addEventListener("click", (event) => {
    if (event.target.classList && event.target.classList.contains("rules-backdrop")) { if (!state.passPending) closeRules(); return; }
    const target = event.target.closest && event.target.closest("[data-action]");
    if (!target) return;
    const a = target.dataset.action;
    const d = target.dataset;
    if (a === "screen") setScreen(d.screen);
    else if (a === "scroll-board") { setScreen("board"); }
    else if (a === "reset") resetGame();
    else if (a === "start-game") startGame();
    else if (a === "open-rules") openRules(d.topic);
    else if (a === "close-rules") closeRules();
    else if (a === "tutorial-next") tutorialNav(1);
    else if (a === "tutorial-back") tutorialNav(-1);
    else if (a === "tutorial-skip") endTutorial();
    else if (a === "replay-tutorial") startTutorial();
    else if (a === "toggle-status") { state.statusOpen = !state.statusOpen; save(); render(); }
    else if (a === "toggle-help") { state.showHelp = !state.showHelp; save(); render(); }
    else if (a === "open-achievements") { state.achievementsOpen = true; save(); render(); }
    else if (a === "close-achievements") { state.achievementsOpen = false; save(); render(); }
    else if (a === "rules-topic") openRules(d.topic);
    else if (a === "continue-pass") continuePass();
    else if (a === "pick-character") pickCharacter(d.char);
    else if (a === "toggle-ticket") toggleTicketKeep(d.ticket);
    else if (a === "confirm-tickets") confirmTickets();
    else if (a === "toggle-drawgoal") toggleDrawGoal(d.ticket);
    else if (a === "commit-drawgoals") { if ((state.drawSelection || []).length) humanAct({ type: "drawgoals", keep: state.drawSelection }); }
    else if (a === "select-draft") selectDraft(d.card);
    else if (a === "clear-draft") { state.draftSelection = null; save(); render(); }
    else if (a === "commit-apply") { if (state.draftSelection && state.cardMarket.includes(state.draftSelection)) humanAct({ type: "apply", cardId: state.draftSelection }); else { notify("Offer gone", "That offer was taken. Pick another."); state.draftSelection = null; render(); } }
    else if (a === "commit-spend") { const p = humanSeatViewing(); humanAct({ type: "purchase", assignments: { ...autoAssignments(p), ...state.spendAssignments } }); }
    else if (a === "select-transfer") selectTransfer(d.target, Number(d.amount));
    else if (a === "clear-transfer") { state.transferSelection = null; save(); render(); }
    else if (a === "commit-transfer") { if (state.transferSelection) humanAct({ type: "transfer", target: state.transferSelection.target, amount: state.transferSelection.amount }); }
    else if (a === "claim") humanAct({ type: "experience", expId: d.experience });
    else if (a === "fulfill") humanAct({ type: "fulfill", goalId: d.goal });
    else if (a === "account") humanAct({ type: "account", cardId: d.card, op: d.op });
    else if (a === "plan-ticket") humanAct({ type: "plan", op: "ticket" });
    else if (a === "end-turn") endTurnNow();
    else if (a === "run-simulation") runSimulation();
  });

  document.addEventListener("keydown", (event) => { if (event.key === "Escape" && state.rulesOverlay && state.rulesOverlay.open) closeRules(); });

  document.addEventListener("change", (event) => {
    const spend = event.target.closest && event.target.closest("[data-action='assign-spend']");
    if (spend) { setAssignment(spend.dataset.category, spend.value); return; }
    const setup = event.target.closest && event.target.closest("[data-action='setup-select']");
    if (setup) setPlayerSetup(setup.dataset.setupKey, setup.value);
  });

  render();
})();

</script>
</body></html>
